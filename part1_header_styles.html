<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法マスター | Lessons 21–30</title>
<style>
:root{
  --navy:#1a2340;--navy2:#253057;--indigo:#3d52a0;--sky:#7091e6;--sky2:#8697c4;
  --cream:#f7f8fc;--white:#fff;--gold:#f0a500;--goldl:#ffd580;
  --green:#28a745;--red:#dc3545;--orange:#fd7e14;--purple:#6f42c1;
  --text:#1a2340;--muted:#6b7a9e;--border:#dde3f0;
  --sh:0 4px 24px rgba(26,35,64,.10);--shl:0 8px 40px rgba(26,35,64,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* HEADER */
header{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;position:sticky;top:0;z-index:200;box-shadow:var(--shl);}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ico{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--navy);}
.logo-txt{font-size:16px;font-weight:700;}
.logo-sub{font-size:10px;opacity:.7;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.xp-badge{background:var(--gold);color:var(--navy);padding:4px 12px;border-radius:20px;font-weight:700;font-size:13px;}
.nav-tab{display:flex;gap:4px;}
.nav-tab button{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;background:rgba(255,255,255,.12);color:#fff;}
.nav-tab button.active,.nav-tab button:hover{background:var(--gold);color:var(--navy);}

/* LAYOUT */
.app{display:flex;max-width:1200px;margin:0 auto;padding:20px 16px;gap:20px;align-items:flex-start;}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;position:sticky;top:70px;}
.sb-sec{background:#fff;border-radius:14px;box-shadow:var(--sh);overflow:hidden;margin-bottom:14px;}
.sb-title{background:var(--navy);color:#fff;padding:9px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.lb{display:block;width:100%;padding:9px 14px;border:none;background:none;text-align:left;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text);border-left:3px solid transparent;transition:.2s;border-bottom:1px solid var(--border);}
.lb:last-child{border-bottom:none;}
.lb:hover{background:#f0f4ff;border-left-color:var(--sky);}
.lb.act{background:#eef2ff;border-left-color:var(--indigo);color:var(--indigo);font-weight:700;}
.lb .ln{display:inline-block;background:var(--indigo);color:#fff;border-radius:4px;padding:1px 6px;font-size:10px;margin-right:5px;font-weight:600;}
.lb.act .ln{background:var(--gold);color:var(--navy);}

/* MAIN */
.main{flex:1;min-width:0;}

/* LESSON CARD */
.lcard{background:#fff;border-radius:18px;box-shadow:var(--sh);overflow:hidden;margin-bottom:18px;}
.lhdr{padding:18px 22px;color:#fff;}
.lhdr-label{font-size:10px;font-weight:700;letter-spacing:2px;opacity:.7;text-transform:uppercase;margin-bottom:3px;}
.lhdr-title{font-size:20px;font-weight:700;}
.lhdr-title .jp{font-size:13px;opacity:.85;font-weight:400;margin-left:8px;}
.lhdr-desc{font-size:12px;margin-top:6px;opacity:.8;line-height:1.6;}

/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--border);background:#fff;}
.tbtn{flex:1;padding:11px 4px;border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;}
.tbtn:hover{color:var(--indigo);}
.tbtn.act{color:var(--indigo);border-bottom-color:var(--indigo);font-weight:700;}
.tcontent{padding:22px;display:none;}
.tcontent.act{display:block;}

/* GRAMMAR SECTIONS */
.gsec{margin-bottom:22px;border-left:4px solid var(--sky);padding-left:14px;}
.gsec-title{font-size:13px;font-weight:700;color:var(--indigo);margin-bottom:10px;display:flex;align-items:center;gap:7px;line-height:1.4;}
.gbadge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--indigo);color:#fff;border-radius:50%;font-size:10px;font-weight:700;flex-shrink:0;}
.formula{background:var(--navy);color:#fff;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:12px;line-height:1.8;}
.formula b{color:var(--goldl);}
.ex{background:#f8f9ff;border-radius:8px;padding:12px 14px;margin-bottom:8px;border:1px solid #e8ecf8;}
.ex-en{font-size:13px;font-weight:500;color:var(--navy);line-height:1.7;margin-bottom:3px;}
.ex-en mark{background:#dde8ff;color:var(--indigo);font-weight:700;border-radius:3px;padding:1px 3px;}
.ex-en em{color:#888;font-style:italic;}
.ex-jp{font-size:11px;color:var(--muted);margin-top:3px;}
.ex-note{font-size:11px;color:#5d4a00;background:#fff9e6;border:1px solid #ffd54f;border-radius:5px;padding:6px 10px;margin-top:6px;line-height:1.6;}
.ex-note::before{content:"💡 ";}
.tips{background:#f0f4ff;border-radius:8px;padding:10px 14px;margin-top:10px;}
.tips p{font-size:11px;color:var(--navy);line-height:1.7;margin-bottom:3px;}
.tips p:last-child{margin-bottom:0;}
.tips p::before{content:"▶ ";}

/* AI */
.ai-area{background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:14px;padding:18px;border:1px solid #d0dafe;}
.ai-title{font-size:12px;font-weight:700;color:var(--indigo);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ai-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;}
.ai-row{display:flex;gap:8px;margin-bottom:8px;}
.ai-input{flex:1;padding:9px 12px;border:2px solid #c5d0f8;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;background:#fff;outline:none;transition:.2s;resize:none;min-height:42px;}
.ai-input:focus{border-color:var(--indigo);}
.ai-btn{padding:9px 16px;background:var(--indigo);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap;}
.ai-btn:hover{background:var(--navy);}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;}
.ai-loading{display:none;align-items:center;gap:7px;font-size:11px;color:var(--muted);padding:4px 0;}
.ai-loading.vis{display:flex;}
.dp span{display:inline-block;width:5px;height:5px;background:var(--sky);border-radius:50%;margin:0 2px;animation:dp 1.2s infinite;}
.dp span:nth-child(2){animation-delay:.2s;}.dp span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-resp{background:#fff;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;color:var(--text);border:1px solid #d0dafe;white-space:pre-wrap;display:none;}
.ai-resp.vis{display:block;}

/* QUIZ */
.qprog{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.qcnt{font-size:11px;color:var(--muted);font-weight:500;}
.pbar-wrap{flex:1;height:7px;background:var(--border);border-radius:10px;margin:0 12px;overflow:hidden;}
.pbar{height:100%;background:linear-gradient(90deg,var(--sky),var(--indigo));border-radius:10px;transition:.4s;}
.score-bdg{background:var(--gold);color:var(--navy);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.qcard{background:#f8f9ff;border-radius:12px;padding:18px;border:1px solid var(--border);margin-bottom:14px;}
.qlabel{font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--sky);text-transform:uppercase;margin-bottom:8px;}
.qtype-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:8px;}
.qtype-mc{background:#e8ecff;color:var(--indigo);}
.qtype-fill{background:#e8f8ed;color:#155724;}
.qtype-sort{background:#fff3cd;color:#856404;}
.qtype-write{background:#fde8ec;color:#721c24;}
.qtype-twist{background:#f3e8ff;color:#5a21a8;}
.qtext{font-size:15px;font-weight:600;line-height:1.7;color:var(--navy);margin-bottom:5px;}
.qsub{font-size:12px;color:#555;margin-bottom:13px;font-style:italic;}
.qopts{display:grid;gap:8px;}
.qopt{padding:11px 14px;border:2px solid var(--border);border-radius:9px;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:.2s;display:flex;align-items:center;gap:9px;color:var(--text);}
.qopt:hover:not(:disabled){border-color:var(--sky);background:#f0f4ff;}
.qopt.ok{border-color:var(--green);background:#e8f8ed;color:#155724;}
.qopt.ng{border-color:var(--red);background:#fde8ec;color:#721c24;}
.qopt:disabled{cursor:default;}
.opt-ind{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:.2s;color:var(--muted);}
.qopt:hover:not(:disabled) .opt-ind{border-color:var(--sky);color:var(--sky);}
.qopt.ok .opt-ind{border-color:var(--green);background:var(--green);color:#fff;}
.qopt.ng .opt-ind{border-color:var(--red);background:var(--red);color:#fff;}

/* Fill/Sort/Write inputs */
.qfill-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:.2s;margin-bottom:10px;}
.qfill-input:focus{border-color:var(--indigo);}
.qfill-input.ok{border-color:var(--green);background:#e8f8ed;}
.qfill-input.ng{border-color:var(--red);background:#fde8ec;}
.qsort-area{margin-bottom:10px;}
.sort-bank{display:flex;flex-wrap:wrap;gap:7px;padding:12px;background:#f0f4ff;border-radius:9px;min-height:46px;margin-bottom:8px;border:2px dashed #c5d0f8;}
.sort-slot{display:flex;flex-wrap:wrap;gap:7px;padding:12px;background:#fff;border-radius:9px;min-height:46px;border:2px dashed var(--border);}
.sort-chip{padding:6px 12px;background:var(--indigo);color:#fff;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;user-select:none;}
.sort-chip:hover{background:var(--navy);}
.sort-chip.placed{background:#28a745;}
.sort-slot-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.qtextarea{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:.2s;resize:vertical;min-height:80px;margin-bottom:10px;}
.qtextarea:focus{border-color:var(--indigo);}
.submit-btn{padding:10px 20px;background:var(--indigo);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;}
.submit-btn:hover{background:var(--navy);}
.qfb{padding:12px 14px;border-radius:9px;font-size:12px;line-height:1.7;margin-top:10px;display:none;}
.qfb.ok{background:#e8f8ed;border:1px solid #b2dfdb;color:#155724;}
.qfb.ng{background:#fde8ec;border:1px solid #f5c6cb;color:#721c24;}
.qfb.vis{display:block;}
.qfb strong{display:block;margin-bottom:3px;}
.qnav{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.btn-next{padding:9px 22px;background:var(--indigo);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;display:none;}
.btn-next:hover{background:var(--navy);}
.btn-next.vis{display:inline-flex;align-items:center;gap:5px;}

/* RESULT */
.result{text-align:center;padding:36px 18px;display:none;}
.result.vis{display:block;}
.result-emoji{font-size:56px;margin-bottom:14px;}
.result-score{font-size:44px;font-weight:700;color:var(--indigo);margin-bottom:6px;}
.result-msg{font-size:14px;color:var(--muted);margin-bottom:22px;}
.result-details{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
.rd-item{background:#f0f4ff;border-radius:10px;padding:10px 16px;text-align:center;}
.rd-num{font-size:22px;font-weight:700;color:var(--indigo);}
.rd-label{font-size:10px;color:var(--muted);margin-top:2px;}
.btn-retry{padding:11px 24px;background:var(--indigo);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;transition:.2s;margin:0 5px;}
.btn-retry:hover{background:var(--navy);}
.btn-retry.sec{background:#fff;color:var(--indigo);border:2px solid var(--indigo);}

/* EXAM */
.exam-home{text-align:center;padding:40px 20px;}
.exam-title{font-size:24px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.exam-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.exam-config{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
.exam-stat{background:#fff;border-radius:12px;padding:14px 20px;box-shadow:var(--sh);text-align:center;min-width:100px;}
.exam-stat-num{font-size:22px;font-weight:700;color:var(--indigo);}
.exam-stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
.start-exam-btn{padding:14px 36px;background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(61,82,160,.3);}
.start-exam-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(61,82,160,.4);}
.exam-q-header{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;padding:16px 22px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
.exam-timer{font-size:18px;font-weight:700;font-family:monospace;}
.exam-q-num{font-size:13px;opacity:.8;}
.exam-body{background:#fff;border-radius:0 0 14px 14px;padding:22px;box-shadow:var(--sh);}
.exam-q-section{margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid var(--border);}
.exam-q-section:last-child{border-bottom:none;margin-bottom:0;}
.exam-section-title{font-size:12px;font-weight:700;color:var(--sky);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.exam-q-item{margin-bottom:18px;padding:14px;background:#f8f9ff;border-radius:10px;border:1px solid var(--border);}
.exam-q-label{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.exam-q-text{font-size:14px;font-weight:600;color:var(--navy);line-height:1.6;margin-bottom:10px;}
.exam-q-opts{display:grid;gap:7px;}
.exam-opt{padding:9px 13px;border:2px solid var(--border);border-radius:8px;background:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:.2s;display:flex;align-items:center;gap:8px;}
.exam-opt:hover{border-color:var(--sky);background:#f0f4ff;}
.exam-opt.selected{border-color:var(--indigo);background:#eef2ff;}
.exam-opt.ex-ok{border-color:var(--green);background:#e8f8ed;}
.exam-opt.ex-ng{border-color:var(--red);background:#fde8ec;}
.exam-input{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:.2s;}
.exam-input:focus{border-color:var(--indigo);}
.exam-input.ex-ok{border-color:var(--green);background:#e8f8ed;}
.exam-input.ex-ng{border-color:var(--red);background:#fde8ec;}
.exam-textarea{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:.2s;resize:vertical;min-height:70px;}
.exam-textarea:focus{border-color:var(--indigo);}
.exam-ans-area{margin-top:6px;font-size:11px;color:#155724;background:#e8f8ed;padding:6px 10px;border-radius:6px;display:none;}
.exam-submit{text-align:center;margin-top:22px;}
.exam-submit-btn{padding:13px 36px;background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;}
.exam-submit-btn:hover{transform:translateY(-2px);}
.exam-result{text-align:center;padding:36px 20px;}
.exam-result-score{font-size:52px;font-weight:700;color:var(--indigo);margin:12px 0;}
.exam-result-total{font-size:18px;color:var(--muted);}
.exam-breakdown{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:20px 0;}
.ex-bd{background:#fff;border-radius:10px;padding:12px 16px;box-shadow:var(--sh);text-align:center;min-width:110px;}
.ex-bd-num{font-size:20px;font-weight:700;}
.ex-bd-label{font-size:10px;color:var(--muted);margin-top:2px;}
.vocab-card{background:#fff;border-radius:14px;box-shadow:var(--sh);padding:24px;margin-bottom:16px;}
.vocab-en{font-size:26px;font-weight:700;color:var(--navy);}
.vocab-pron{font-size:13px;color:var(--muted);margin:4px 0;}
.vocab-phrase{font-size:15px;color:var(--indigo);margin:10px 0 4px;}
.vocab-jp-phrase{font-size:13px;color:var(--muted);}
.vocab-jp{font-size:16px;font-weight:700;color:var(--green);margin-top:10px;}
.vocab-ex{font-size:13px;font-style:italic;color:#555;margin-top:6px;}
.vocab-notice{background:#fff9e6;border:1px solid #ffd54f;border-radius:10px;padding:16px;text-align:center;color:#856404;font-size:13px;line-height:1.7;}

/* VOCAB */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.vc{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:14px;border-left:4px solid var(--gold);}
.vc-num{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;}
.vc-en{font-size:16px;font-weight:700;color:var(--navy);}
.vc-phrase{font-size:11px;color:var(--indigo);margin:4px 0;}
.vc-jp{font-size:12px;color:var(--text);line-height:1.5;}

@media(max-width:768px){
  .app{flex-direction:column;padding:10px;}
  .sidebar{width:100%;position:static;}
  .sb-sec{display:grid;grid-template-columns:repeat(3,1fr);}
  .sb-title{grid-column:1/-1;}
  .lb{border-bottom:1px solid var(--border);border-left:none;border-bottom:2px solid transparent;}
  .lb.act{border-bottom-color:var(--indigo);}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
