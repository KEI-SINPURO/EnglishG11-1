<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法マスター | Lessons 21–30</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-ico">47</div>
      <div>
        <div class="logo-txt">英文法マスター</div>
        <div class="logo-sub">Lessons 21–30 ｜ 比較・関係詞・仮定法</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="nav-tab">
        <button class="ntb act" onclick="switchPage('grammar',this)">📖 文法</button>
        <button class="ntb" onclick="switchPage('vocab',this)">📝 単語</button>
        <button class="ntb" onclick="switchPage('exam',this)">📋 期末テスト</button>
      </div>
      <div class="xp-badge" id="xpBadge">0 XP</div>
    </div>
  </div>
</header>

<!-- ===== 文法ページ ===== -->
<div id="page-grammar" class="page act">
  <div class="app">
    <nav class="sidebar">
      <div class="sb-sec">
        <div class="sb-title">📊 比較</div>
        <button class="lb act" onclick="showLesson('l21',this)"><span class="ln">21</span>比較(1) 原級・比較級</button>
        <button class="lb"     onclick="showLesson('l22',this)"><span class="ln">22</span>比較(2) 最上級</button>
        <button class="lb"     onclick="showLesson('l23',this)"><span class="ln">23</span>比較(3) 応用・no比較</button>
      </div>
      <div class="sb-sec">
        <div class="sb-title">🔗 関係詞</div>
        <button class="lb" onclick="showLesson('l24',this)"><span class="ln">24</span>関係詞(1) who/which/whose/that</button>
        <button class="lb" onclick="showLesson('l25',this)"><span class="ln">25</span>関係詞(2) 前置詞・what・限定/継続</button>
        <button class="lb" onclick="showLesson('l26',this)"><span class="ln">26</span>関係詞(3) 関係副詞・複合関係詞</button>
        <button class="lb" onclick="showLesson('l27',this)"><span class="ln">27</span>関係詞(4) 譲歩・as/than・what慣用</button>
      </div>
      <div class="sb-sec">
        <div class="sb-title">✨ 仮定法</div>
        <button class="lb" onclick="showLesson('l28',this)"><span class="ln">28</span>仮定法(1) 仮定法過去/過去完了</button>
        <button class="lb" onclick="showLesson('l29',this)"><span class="ln">29</span>仮定法(2) wish・as if・ifの省略</button>
        <button class="lb" onclick="showLesson('l30',this)"><span class="ln">30</span>仮定法(3) if節相当・慣用・ていねい</button>
      </div>
    </nav>
    <main class="main" id="grammarMain"></main>
  </div>
</div>

<!-- ===== 単語ページ ===== -->
<div id="page-vocab" class="page">
  <div class="vocab-page" id="vocabContent"></div>
</div>

<!-- ===== 期末テストページ ===== -->
<div id="page-exam" class="page">
  <div class="exam-page" id="examContent"></div>
</div>

<!-- データファイル（順番厳守） -->
<script src="data/vocab.js"></script>
<script src="data/grammar.js"></script>
<script src="data/quiz.js"></script>
<!-- アプリロジック -->
<script src="js/app.js"></script>
</body>
</html>
