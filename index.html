<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法マスター | Lessons 21–30</title>
<style>
/* ============================================================
   英文法マスター — style.css
   ============================================================ */

:root {
  --navy:   #1a2340;
  --indigo: #3d52a0;
  --sky:    #7091e6;
  --cream:  #f7f8fc;
  --gold:   #f0a500;
  --goldl:  #ffd580;
  --green:  #28a745;
  --red:    #dc3545;
  --text:   #1a2340;
  --muted:  #6b7a9e;
  --border: #dde3f0;
  --sh:  0 4px 20px rgba(26,35,64,.10);
  --shl: 0 8px 32px rgba(26,35,64,.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* ── ヘッダー ─────────────────────────────── */
header {
  background: linear-gradient(135deg, var(--navy), var(--indigo));
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shl);
}
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  gap: 10px;
  flex-wrap: wrap;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-ico {
  width: 32px; height: 32px;
  background: var(--gold);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--navy);
}
.logo-txt  { font-size: 15px; font-weight: 700; }
.logo-sub  { font-size: 10px; opacity: .7; margin-top: 1px; }
.hdr-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.xp-badge  {
  background: var(--gold); color: var(--navy);
  padding: 3px 11px; border-radius: 20px;
  font-weight: 700; font-size: 12px;
}
.nav-tab { display: flex; gap: 3px; }
.ntb {
  padding: 5px 12px; border: none; border-radius: 7px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: .2s;
  background: rgba(255,255,255,.15); color: #fff;
}
.ntb.act, .ntb:hover { background: var(--gold); color: var(--navy); }

/* ── ページ切替 ───────────────────────────── */
.page     { display: none; }
.page.act { display: block; }

/* ── レイアウト ───────────────────────────── */
.app {
  display: flex;
  max-width: 1180px;
  margin: 0 auto;
  padding: 18px 14px;
  gap: 18px;
  align-items: flex-start;
}

/* ── サイドバー ───────────────────────────── */
.sidebar { width: 210px; flex-shrink: 0; position: sticky; top: 64px; }
.sb-sec  { background: #fff; border-radius: 12px; box-shadow: var(--sh); overflow: hidden; margin-bottom: 12px; }
.sb-title {
  background: var(--navy); color: #fff;
  padding: 8px 13px; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.lb {
  display: block; width: 100%;
  padding: 8px 13px; border: none; background: none;
  text-align: left; cursor: pointer;
  font-size: 11px; color: var(--text);
  border-left: 3px solid transparent;
  transition: .2s;
  border-bottom: 1px solid var(--border);
  line-height: 1.4;
}
.lb:last-child { border-bottom: none; }
.lb:hover      { background: #f0f4ff; border-left-color: var(--sky); }
.lb.act        { background: #eef2ff; border-left-color: var(--indigo); color: var(--indigo); font-weight: 700; }
.ln {
  display: inline-block; background: var(--indigo); color: #fff;
  border-radius: 4px; padding: 1px 5px; font-size: 10px;
  margin-right: 4px; font-weight: 600;
}
.lb.act .ln { background: var(--gold); color: var(--navy); }

/* ── メインコンテンツ ─────────────────────── */
.main { flex: 1; min-width: 0; }

/* ── レッスンカード ───────────────────────── */
.lcard { background: #fff; border-radius: 16px; box-shadow: var(--sh); overflow: hidden; margin-bottom: 16px; }
.lhdr  { padding: 16px 20px; color: #fff; }
.lhdr-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: .7; text-transform: uppercase; margin-bottom: 3px; }
.lhdr-title { font-size: 18px; font-weight: 700; }
.lhdr-title .jp { font-size: 12px; opacity: .85; font-weight: 400; margin-left: 6px; }
.lhdr-desc  { font-size: 11px; margin-top: 5px; opacity: .8; line-height: 1.6; }

/* ── タブ ────────────────────────────────── */
.tab-bar { display: flex; border-bottom: 2px solid var(--border); }
.tbtn {
  flex: 1; padding: 10px 4px;
  border: none; background: none;
  font-size: 11px; font-weight: 500; color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: .2s;
}
.tbtn:hover  { color: var(--indigo); }
.tbtn.act    { color: var(--indigo); border-bottom-color: var(--indigo); font-weight: 700; }
.tc          { padding: 20px; display: none; }
.tc.act      { display: block; }

/* ── 解説セクション ───────────────────────── */
.gsec { margin-bottom: 20px; border-left: 4px solid var(--sky); padding-left: 13px; }
.gsec-title {
  font-size: 12px; font-weight: 700; color: var(--indigo);
  margin-bottom: 9px;
  display: flex; align-items: flex-start; gap: 6px;
  line-height: 1.4;
}
.gbadge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 19px; height: 19px;
  background: var(--indigo); color: #fff;
  border-radius: 50%; font-size: 10px; font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
}
.formula {
  background: var(--navy); color: #fff;
  border-radius: 7px; padding: 9px 13px;
  margin: 7px 0; font-size: 11px; line-height: 1.8;
}
.formula b { color: var(--goldl); }
.ex { background: #f8f9ff; border-radius: 7px; padding: 11px 13px; margin-bottom: 7px; border: 1px solid #e8ecf8; }
.ex-en { font-size: 13px; font-weight: 500; color: var(--navy); line-height: 1.7; }
.ex-en mark { background: #dde8ff; color: var(--indigo); font-weight: 700; border-radius: 3px; padding: 1px 3px; font-style: normal; }
.ex-en em   { color: #888; font-style: italic; }
.ex-jp      { font-size: 11px; color: var(--muted); margin-top: 3px; }
.ex-note {
  font-size: 11px; color: #5d4a00;
  background: #fff9e6; border: 1px solid #ffd54f;
  border-radius: 5px; padding: 6px 9px;
  margin-top: 5px; line-height: 1.6;
}
.ex-note::before { content: "💡 "; }
.tips-box { background: #f0f4ff; border-radius: 7px; padding: 9px 13px; margin-top: 8px; }
.tips-box p { font-size: 11px; color: var(--navy); line-height: 1.7; margin-bottom: 2px; }
.tips-box p::before { content: "▶ "; }

/* ── AIチャット ───────────────────────────── */
.ai-area {
  background: linear-gradient(135deg, #f0f4ff, #e8ecff);
  border-radius: 12px; padding: 16px; border: 1px solid #d0dafe;
}
.ai-title { font-size: 12px; font-weight: 700; color: var(--indigo); margin-bottom: 10px; }
.ai-desc  { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
.ai-row   { display: flex; gap: 8px; margin-bottom: 8px; }
.ai-input {
  flex: 1; padding: 8px 11px;
  border: 2px solid #c5d0f8; border-radius: 7px;
  font-size: 12px; background: #fff; outline: none;
  transition: .2s; resize: none; min-height: 40px;
  font-family: inherit;
}
.ai-input:focus { border-color: var(--indigo); }
.ai-btn {
  padding: 8px 14px; background: var(--indigo); color: #fff;
  border: none; border-radius: 7px;
  font-weight: 700; font-size: 12px; cursor: pointer;
  transition: .2s; white-space: nowrap;
}
.ai-btn:hover    { background: var(--navy); }
.ai-btn:disabled { opacity: .5; cursor: not-allowed; }
.ai-loading { display: none; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); padding: 3px 0; }
.ai-loading.vis { display: flex; }
.dp span {
  display: inline-block; width: 5px; height: 5px;
  background: var(--sky); border-radius: 50%; margin: 0 2px;
  animation: dp 1.2s infinite;
}
.dp span:nth-child(2) { animation-delay: .2s; }
.dp span:nth-child(3) { animation-delay: .4s; }
@keyframes dp {
  0%,80%,100% { transform: scale(.6); opacity: .4; }
  40%         { transform: scale(1);  opacity: 1; }
}
.ai-resp {
  background: #fff; border-radius: 7px; padding: 11px;
  font-size: 12px; line-height: 1.8; color: var(--text);
  border: 1px solid #d0dafe; white-space: pre-wrap;
  display: none; margin-top: 6px;
}
.ai-resp.vis { display: block; }

/* ── クイズ共通 ───────────────────────────── */
.qprog { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.qcnt  { font-size: 11px; color: var(--muted); }
.pbar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 10px; margin: 0 10px; overflow: hidden; }
.pbar      { height: 100%; background: linear-gradient(90deg, var(--sky), var(--indigo)); border-radius: 10px; transition: .4s; }
.score-bdg { background: var(--gold); color: var(--navy); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }

.qcard { background: #f8f9ff; border-radius: 11px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
.qlbl  { font-size: 10px; letter-spacing: 1.5px; font-weight: 700; color: var(--sky); text-transform: uppercase; margin-bottom: 6px; }
.qtbadge { display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 700; margin-bottom: 7px; }
.tb-mc    { background: #e8ecff; color: var(--indigo); }
.tb-fill  { background: #e8f8ed; color: #155724; }
.tb-sort  { background: #fff3cd; color: #856404; }
.tb-write { background: #fde8ec; color: #721c24; }
.tb-twist { background: #f3e8ff; color: #5a21a8; }
.qtext { font-size: 14px; font-weight: 600; line-height: 1.7; color: var(--navy); margin-bottom: 4px; white-space: pre-wrap; }
.qsub  { font-size: 12px; color: #555; margin-bottom: 12px; font-style: italic; }

.qopts { display: grid; gap: 7px; }
.qopt {
  padding: 10px 13px; border: 2px solid var(--border);
  border-radius: 8px; background: #fff;
  font-size: 13px; cursor: pointer;
  text-align: left; transition: .2s;
  display: flex; align-items: center; gap: 8px;
  color: var(--text); font-family: inherit;
}
.qopt:hover:not(:disabled) { border-color: var(--sky); background: #f0f4ff; }
.qopt.ok  { border-color: var(--green); background: #e8f8ed; color: #155724; }
.qopt.ng  { border-color: var(--red);   background: #fde8ec; color: #721c24; }
.qopt:disabled { cursor: default; }
.opt-ind {
  width: 21px; height: 21px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
  transition: .2s; color: var(--muted);
}
.qopt:hover:not(:disabled) .opt-ind { border-color: var(--sky); color: var(--sky); }
.qopt.ok .opt-ind { border-color: var(--green); background: var(--green); color: #fff; }
.qopt.ng .opt-ind { border-color: var(--red);   background: var(--red);   color: #fff; }

.fill-input {
  width: 100%; padding: 9px 12px;
  border: 2px solid var(--border); border-radius: 8px;
  font-size: 13px; outline: none; transition: .2s;
  margin-bottom: 8px; font-family: inherit;
}
.fill-input:focus { border-color: var(--indigo); }
.fill-input.ok    { border-color: var(--green); background: #e8f8ed; }
.fill-input.ng    { border-color: var(--red);   background: #fde8ec; }

.slot-lbl  { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
.sort-bank {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px; background: #f0f4ff;
  border-radius: 8px; min-height: 42px;
  margin-bottom: 7px; border: 2px dashed #c5d0f8;
}
.sort-slot {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px; background: #fff;
  border-radius: 8px; min-height: 42px;
  border: 2px dashed var(--border); margin-bottom: 8px;
}
.chip {
  padding: 5px 10px; background: var(--indigo); color: #fff;
  border-radius: 5px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: .2s; user-select: none; border: none;
}
.chip:hover   { background: var(--navy); }
.chip.placed  { background: var(--green); }

.write-area {
  width: 100%; padding: 9px 12px;
  border: 2px solid var(--border); border-radius: 8px;
  font-size: 13px; outline: none; transition: .2s;
  resize: vertical; min-height: 72px;
  margin-bottom: 8px; font-family: inherit;
}
.write-area:focus { border-color: var(--indigo); }

.submit-btn {
  padding: 8px 18px; background: var(--indigo); color: #fff;
  border: none; border-radius: 8px;
  font-weight: 700; font-size: 12px; cursor: pointer; transition: .2s;
  font-family: inherit;
}
.submit-btn:hover { background: var(--navy); }

.qfb { padding: 11px 13px; border-radius: 8px; font-size: 12px; line-height: 1.7; margin-top: 9px; display: none; }
.qfb.ok  { background: #e8f8ed; border: 1px solid #b2dfdb; color: #155724; }
.qfb.ng  { background: #fde8ec; border: 1px solid #f5c6cb; color: #721c24; }
.qfb.vis { display: block; }
.qfb strong { display: block; margin-bottom: 3px; }

.qnav { display: flex; justify-content: flex-end; margin-top: 12px; }
.btn-next {
  padding: 8px 20px; background: var(--indigo); color: #fff;
  border: none; border-radius: 8px;
  font-weight: 700; font-size: 12px; cursor: pointer; transition: .2s;
  display: none; align-items: center; gap: 5px;
  font-family: inherit;
}
.btn-next:hover { background: var(--navy); }
.btn-next.vis   { display: inline-flex; }

/* ── 結果画面 ─────────────────────────────── */
.result { text-align: center; padding: 32px 16px; display: none; }
.result.vis { display: block; }
.result-emoji { font-size: 52px; margin-bottom: 12px; }
.result-score { font-size: 40px; font-weight: 700; color: var(--indigo); margin-bottom: 5px; }
.result-msg   { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.btn-retry {
  padding: 10px 22px; background: var(--indigo); color: #fff;
  border: none; border-radius: 10px;
  font-weight: 700; font-size: 13px; cursor: pointer; transition: .2s; margin: 0 4px;
  font-family: inherit;
}
.btn-retry:hover { background: var(--navy); }
.btn-retry.sec   { background: #fff; color: var(--indigo); border: 2px solid var(--indigo); }

/* ── 単語ページ ───────────────────────────── */
.vocab-page   { max-width: 1180px; margin: 0 auto; padding: 18px 14px; }
.vocab-notice {
  background: #fff9e6; border: 1px solid #ffd54f;
  border-radius: 10px; padding: 14px 18px;
  margin-bottom: 14px; font-size: 12px; color: #856404; line-height: 1.7;
}
.vocab-header { background: #fff; border-radius: 12px; box-shadow: var(--sh); padding: 16px 20px; margin-bottom: 14px; }
.vocab-header h2 { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.vocab-header p  { font-size: 11px; color: var(--muted); line-height: 1.6; }

.vocab-search { display: flex; gap: 8px; margin-bottom: 12px; }
.vocab-search input {
  flex: 1; padding: 8px 12px;
  border: 2px solid var(--border); border-radius: 8px;
  font-size: 13px; outline: none; transition: .2s; font-family: inherit;
}
.vocab-search input:focus { border-color: var(--indigo); }
.vocab-search select {
  padding: 8px 12px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 12px; outline: none;
  background: #fff; cursor: pointer; font-family: inherit;
}

.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 14px; }
.vc {
  background: #fff; border-radius: 9px; box-shadow: var(--sh);
  padding: 12px 14px; border-left: 4px solid var(--gold); transition: .2s;
}
.vc:hover { transform: translateY(-1px); box-shadow: var(--shl); }
.vc-num  { font-size: 10px; color: var(--muted); font-weight: 700; margin-bottom: 2px; }
.vc-en   { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 1px; }
.vc-jp   { font-size: 12px; color: var(--text); font-weight: 600; }
.vc-new  {
  display: inline-block; background: #fde8ec; color: var(--red);
  border-radius: 4px; padding: 1px 5px;
  font-size: 9px; font-weight: 700; margin-left: 4px; vertical-align: middle;
}
.vocab-quiz-area { background: #fff; border-radius: 12px; box-shadow: var(--sh); padding: 18px; margin-top: 14px; }

/* ── 期末テストページ ─────────────────────── */
.exam-page { max-width: 900px; margin: 0 auto; padding: 18px 14px; }
.exam-home {
  background: #fff; border-radius: 16px; box-shadow: var(--sh);
  padding: 28px 22px; text-align: center;
}
.exam-home h2 { font-size: 21px; font-weight: 700; color: var(--navy); margin-bottom: 7px; }
.exam-home p  { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }

.exam-stats { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
.estat      { background: #f0f4ff; border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 85px; }
.estat-num  { font-size: 18px; font-weight: 700; color: var(--indigo); }
.estat-pts  { font-size: 14px; font-weight: 700; color: var(--gold); }
.estat-lbl  { font-size: 10px; color: var(--muted); margin-top: 2px; }

.start-btn {
  padding: 12px 30px;
  background: linear-gradient(135deg, var(--navy), var(--indigo));
  color: #fff; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: .2s;
  box-shadow: 0 4px 14px rgba(61,82,160,.3); font-family: inherit;
}
.start-btn:hover { transform: translateY(-2px); }

.ep-bar-row { background: #fff; border-radius: 9px; padding: 9px 14px; box-shadow: var(--sh); margin-bottom: 12px; display: flex; align-items: center; gap: 9px; }
.ep-lbl { font-size: 11px; color: var(--muted); white-space: nowrap; }
.ep-bw  { flex: 1; height: 7px; background: var(--border); border-radius: 10px; overflow: hidden; }
.ep-b   { height: 100%; background: linear-gradient(90deg, var(--sky), var(--indigo)); border-radius: 10px; transition: .4s; }
.ep-n   { font-size: 11px; color: var(--indigo); font-weight: 700; white-space: nowrap; }

.exam-sec-card { background: #fff; border-radius: 12px; box-shadow: var(--sh); margin-bottom: 12px; overflow: hidden; }
.exam-sec-hdr  { padding: 10px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; }
.exam-sec-body { padding: 14px; }

.eqi       { margin-bottom: 14px; padding: 12px; background: #f8f9ff; border-radius: 9px; border: 1px solid var(--border); }
.eqi:last-child { margin-bottom: 0; }
.eqi-lbl   { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
.eqi-txt   { font-size: 13px; font-weight: 600; color: var(--navy); line-height: 1.6; margin-bottom: 8px; white-space: pre-wrap; }

.exam-opts { display: grid; gap: 6px; }
.exam-opt  {
  padding: 8px 12px; border: 2px solid var(--border);
  border-radius: 7px; background: #fff;
  font-size: 12px; cursor: pointer; text-align: left; transition: .2s;
  display: flex; align-items: center; gap: 7px; font-family: inherit;
}
.exam-opt:hover  { border-color: var(--sky); background: #f0f4ff; }
.exam-opt.sel    { border-color: var(--indigo); background: #eef2ff; }
.exam-opt.ex-ok  { border-color: var(--green); background: #e8f8ed; }
.exam-opt.ex-ng  { border-color: var(--red);   background: #fde8ec; }
.eoi {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0; transition: .2s; color: var(--muted);
}
.exam-opt.sel   .eoi { border-color: var(--indigo); background: var(--indigo); color: #fff; }
.exam-opt.ex-ok .eoi { border-color: var(--green);  background: var(--green);  color: #fff; }
.exam-opt.ex-ng .eoi { border-color: var(--red);    background: var(--red);    color: #fff; }

.exam-input {
  width: 100%; padding: 8px 11px;
  border: 2px solid var(--border); border-radius: 7px;
  font-size: 12px; outline: none; transition: .2s;
  font-family: inherit; margin-bottom: 5px;
}
.exam-input:focus  { border-color: var(--indigo); }
.exam-input.ex-ok  { border-color: var(--green); background: #e8f8ed; }
.exam-input.ex-ng  { border-color: var(--red);   background: #fde8ec; }

.exam-textarea {
  width: 100%; padding: 8px 11px;
  border: 2px solid var(--border); border-radius: 7px;
  font-size: 12px; outline: none; transition: .2s;

          {en:"(b) They live in <mark>a house</mark> <mark>which</mark> stands on a hill.",jp:"彼らは丘の上に建つ家に住んでいる。",note:"[先行詞：人以外]"},
        ],tips:[]
      },
      {id:"24B",badge:"B",title:"whom と which（目的格）",
        formula:"先行詞（人）＋<b>(whom)</b>＋S＋V ／ 先行詞（物）＋<b>(which)</b>＋S＋V",
        points:[
          {en:"② (a) <mark>The man</mark> <mark>(whom)</mark> I met on the street works at a bank.",jp:"街で会った男性は銀行で働いている。",note:"[先行詞：人] whomは文章体。目的語の働きをする場合でもwhoが用いられることが多い。目的格の関係代名詞は省略されることが多い。"},
          {en:"*(b) I'm reading <mark>a book</mark> <mark>(which)</mark> I borrowed from the library.",jp:"私は図書館から借りた本を読んでいる。",note:"[先行詞：人以外]"},
        ],tips:[]
      },
      {id:"24C",badge:"C",title:"whose（所有格）",
        formula:"先行詞（人/物）＋<b>whose</b>＋名詞",
        points:[
          {en:"③ (a) He has <mark>a friend</mark> <mark>whose wife</mark> is a singer.",jp:"彼は妻が歌手である友人がいる。",note:"[先行詞：人] 〈whose＋名詞〉の形で使い、所有格の代名詞の意味を表す。"},
          {en:"(b) I'm looking for <mark>a book</mark> <mark>whose subject</mark> is jazz.",jp:"私はジャズをテーマにした本を探している。",note:"[先行詞：人以外] 所有格の関係代名詞は先行詞にかかわらずwhoseを使う。"},
        ],tips:[]
      },
      {id:"24D",badge:"D",title:"that（主格／目的格）— thatが特に使われる場合",
        formula:"先行詞（人/物）＋<b>that</b>＋V（主格）／ <b>(that)</b>＋S＋V（目的格）",
        points:[
          {en:"*④ (a) I lent him <em>the money</em> <mark>that</mark> was in my pocket.",jp:"私は彼にポケットの中にあったお金を貸した。",note:"that：whichの代わりにthatがよく使われる（主格・目的格）。所有格としては使えない。"},
          {en:"(b) Where is <em>the CD</em> <mark>(that)</mark> I bought yesterday?",jp:"私が昨日買ったCDはどこですか？"},
        ],
        tips:["thatが特に使われる場合：","(A)先行詞が人以外でthe first, the last,〈the＋最上級〉,the same, the onlyなどの修飾語を伴う場合：This is the only suit that I have.","(B)先行詞がall, every, any, noなどを伴う場合：Running the marathon took all the strength that she had.","(C)先行詞が〈人＋人以外のもの〉の場合：He talked about the people and the things that had fascinated him during his trip.","(D)先行詞が疑問詞whoの場合：Who that has seen the Pyramids can forget their beauty?","(E)先行詞が人の性質や状態を表し、関係代名詞が関係詞節で補語となっている場合：He is not the man that he was ten years ago."]
      }
    ]
  },
  l25:{num:25,title:"関係詞 (2)",jp:"前置詞・what・限定用法と継続用法",color:"#5563a8",
    desc:"前置詞と関係代名詞の組み合わせ、whatの用法、限定用法と継続用法の違い。",
    sections:[
      {id:"25A",badge:"A",title:"前置詞と関係代名詞",
        formula:"先行詞＋<b>前置詞＋whom/which</b>＋S＋V（文語体）",
        points:[
          {en:"① (a) He is <mark>the actor</mark> <mark>(who(m)[that])</mark> Ann sent a fan letter <mark>to</mark>.",jp:"彼はアンがファンレターを送った俳優だ。"},
          {en:"(b) This is <mark>the city</mark> <mark>(which[that])</mark> I was born <mark>in</mark>.",jp:"ここは私が生まれた都市だ。"},
        ],
        tips:["①前置詞を関係詞節の後ろに置く場合は who(m)/which/that が使えて省略も可。","前置詞を関係代名詞の前に置く場合は whom か which のみ使用可能、省略不可。","例：He is the actor to whom(×who/that) Ann sent a fan letter.（文章体）","群動詞の前置詞は関係代名詞の前に出さない：My mother found the key (which[that]) I had been looking for."]
      },
      {id:"25B",badge:"B",title:"what（先行詞を含む関係代名詞）",
        formula:"<b>what</b>＝the thing(s) that〜（先行詞を内包）",
        points:[
          {en:"② (a) <mark>What</mark> worries me is the result of the exam.",jp:"私を悩ませているのは試験の結果だ。"},
          {en:"(b) They couldn't believe <mark>what</mark> they saw.",jp:"彼らは自分たちが見たものを信じられなかった。"},
          {en:"(c) This watch is just <mark>what</mark> I wanted!",jp:"この時計はまさに私が欲しかったものだ！"},
        ],
        tips:["② 関係代名詞what：「〜すること[もの]」という意味を表し、先行詞なしで使う。","whatの導く節は名詞節で、(a)文全体の主語、(b)目的語、(c)補語になる。"]
      },
      {id:"25C",badge:"C",title:"限定用法と継続用法・継続用法の表す意味",formula:"",
        points:[
          {en:"③ (a) He married <mark>[a woman]</mark> <mark>who(m)</mark> he met at the hospital.",jp:"彼は病院で会った女性と結婚した。",note:"限定用法：先行詞の内容を限定する。"},
          {en:"(b) He married <mark>[my sister]</mark>, <mark>who(m)</mark> he met at the hospital.",jp:"彼は私の姉と結婚した。彼女には病院で会った。",note:"継続用法：先行詞の内容を補足説明する。関係代名詞の前にコンマ(,)を入れる。thatは継続用法には用いない。"},
          {en:"④ (a) He gave me some chocolates, <mark>which</mark> I ate at once. (＝ and ～)",jp:"彼はチョコレートをくれたので、私はすぐに食べた。"},
          {en:"(b) She lent me some books, <mark>which</mark> were not interesting. (＝ but they ～)",jp:"彼女は私に本を何冊か貸してくれたが、それらはおもしろくなかった。"},
          {en:"(c) I telephoned Rod, <mark>who</mark> had called while I was out. (＝ because he ～)",jp:"私はロッドに電話した。外出中に電話してきていたからだ。"},
        ],
        tips:["「唯一のもの」を表す固有名詞などは、限定用法の関係代名詞の先行詞にはならない：Do you know of Chopin, who is a world-famous composer?","継続用法はand, but, becauseなどの接続詞を使って書きかえることができる場合もある。"]
      },
      {id:"25D",badge:"D",title:"継続用法の which の用法",formula:"",
        points:[
          {en:"⑤ (a) He wore a brown suit, <mark>which</mark> was made in Italy.",jp:"彼はイタリア製のブラウンのスーツを着ていた。"},
          {en:"(b) He said he wasn't afraid of ghosts, <mark>which</mark> wasn't true.",jp:"彼は幽霊が怖くないと言ったが、それは本当ではなかった。"},
          {en:"(c) It rained all day yesterday, <mark>which</mark> I expected.",jp:"昨日は一日中雨だった。私はそれを予期していた。"},
        ],
        tips:["継続用法のwhichは、(a)直前の文中の一部の語句を先行詞とするほか、(b)直前の文中の節全体や(c)直前の文の内容全体を先行詞とすることがある。"]
      }
    ]
  },
  l26:{num:26,title:"関係詞 (3)",jp:"関係副詞（where・when・why・how）・複合関係詞",color:"#5563a8",
    desc:"関係副詞の4種類と複合関係詞（whoever・whatever・wheneverなど）の用法。",
    sections:[
      {id:"26A",badge:"A",title:"関係副詞（where・when・why・how）",
        formula:"先行詞（場所）＋<b>where</b> ／ 先行詞（時）＋<b>when</b> ／ 先行詞（理由）＋<b>why</b> ／ 先行詞なし＋<b>how</b>",
        points:[
          {en:"① This is <mark>[the hospital]</mark> <mark>where</mark> my aunt works.",jp:"ここは私の叔母が働いている病院だ。",note:"where：「場所」を表す副詞の役割。〈前置詞＋which〉で書きかえ可。先行詞なしで「〜する場所」を表すこともできる。"},
          {en:"② There was <mark>[a time]</mark> <mark>when</mark> dinosaurs lived on the earth.",jp:"恐竜が地球上に生きていた時代があった。",note:"when：「時」を表す副詞の役割。〈前置詞＋which〉で書きかえ可。"},
          {en:"③ (a) Tell me <mark>[the reason]</mark> <mark>why</mark> you look so happy today.",jp:"今日そんなに幸せそうな理由を教えて。",note:"why：「〜する(理由)」。先行詞はreason(s)で省略されることもある。"},
          {en:"(b) I really like sweets. That's <mark>why</mark> my teeth are bad.",jp:"私は甘いものが大好きです。だから歯が悪いのです。"},
          {en:"④ That's <mark>how</mark> he succeeded in business.",jp:"それが彼がビジネスで成功したやり方だ。",note:"how：「〜するやり方[方法]」先行詞なしで使う。the way(in which)...で表せる。×the way how"},
          {en:"⑤ (a) She moved to New York, <mark>where</mark> she studied music.",jp:"彼女はニューヨークへ引っ越した。そこで音楽を勉強した。",note:"関係副詞の継続用法：whereとwhenは継続用法で使える。"},
          {en:"(b) I was taking a shower at seven, <mark>when</mark> the lights went out!",jp:"7時にシャワーを浴びていると、突然停電した！"},
        ],
        tips:["場合・状況・立場などを表す語(case, point, situationなど)も先行詞となる：These are the cases where this rule does not apply."]
      },
      {id:"26B",badge:"B",title:"複合関係詞（whoever・whichever・whatever・whenever・wherever）",
        formula:"<b>複合関係詞</b>（-ever）＝名詞節または副詞節を作る",
        points:[
          {en:"⑥ (a) The club admits <mark>whoever</mark> pays the entry fee.",jp:"そのクラブは入場料を払う人は誰でも入れる。",note:"〜する人はだれでも"},
          {en:"(b) Help yourself to <mark>whichever</mark> you want.",jp:"欲しいものはどれでもお取りください。",note:"〜するものはどれ[どちら]でも"},
          {en:"(c) You can order <mark>whatever</mark> you like.",jp:"あなたは何でも好きなものを注文できる。",note:"〜するものは何でも"},
          {en:"⑦ (a) On holidays, we can get up <mark>whenever</mark> we want to.",jp:"休日には、好きな時間に起きることができる。",note:"〜する時ならいつでも"},
          {en:"(b) I visit my uncle <mark>whenever</mark> I go to Osaka.",jp:"大阪に行く時はいつも叔父を訪問する。",note:"〜する時はいつも"},
          {en:"(c) Put the table <mark>wherever</mark> you like.",jp:"テーブルは好きなところに置いていいですよ。",note:"〜するところならどこでも"},
        ],
        tips:["whicheverとwhateverは直後に名詞を置いて形容詞的に用いることができる：You can have whichever book you like."]
      }
    ]
  },
  l27:{num:27,title:"関係詞 (4)",jp:"譲歩の複合関係詞・as/than・様々な用法・what慣用表現",color:"#5563a8",
    desc:"「〜しようとも」の譲歩を表す複合関係詞、関係代名詞として働くasとthan、関係代名詞の様々な用法、whatを使った慣用表現。",
    sections:[
      {id:"27A",badge:"A",title:"「譲歩」を表す複合関係詞 ▶「〜しようとも」という意味を表し副詞節を作る",
        formula:"<b>however</b>＋形容詞/副詞＋S＋V「どれほど〜でも」",
        points:[
          {en:"① (a) <mark>Whoever</mark> calls me, I don't want to answer the phone.",jp:"誰が電話してきても、私は出たくない。",note:"だれが〜しようとも（＝no matter who）"},
          {en:"(b) <mark>Whichever</mark> you take, please return it tomorrow.",jp:"どれを取っても、明日返してください。",note:"どれを[どちらを]〜しようとも（＝no matter which）"},
          {en:"(c) <mark>Whatever</mark> happens, I will always love you.",jp:"何が起こっても、私はずっとあなたを愛している。",note:"何が[を]〜しようとも（＝no matter what）"},
          {en:"② (a) <mark>However tired</mark> she is, she always smiles.",jp:"どんなに疲れていても、彼女はいつも微笑む。",note:"どれほど〜でも（＝no matter how）"},
          {en:"(b) You will be welcomed <mark>whenever</mark> you come.",jp:"いつ来ても歓迎されますよ。",note:"いつ〜しようとも（＝no matter when）"},
          {en:"(c) I'll be thinking of you <mark>wherever</mark> you go.",jp:"あなたがどこへ行っても、私はあなたのことを思っているよ。",note:"どこへ[で]〜しようとも（＝no matter where）"},
        ],
        tips:["この用法の複合関係詞はno matter...で書きかえることができる。","whoever=no matter who ／ whichever=no matter which ／ whatever=no matter what","however=no matter how ／ whenever=no matter when ／ wherever=no matter where"]
      },
      {id:"27B",badge:"B",title:"関係代名詞の働きをする as と than",formula:"",
        points:[
          {en:"③ (a) This is <em>the same</em> jacket <mark>as</mark> was worn by the actor in the movie.",jp:"これはその映画でその俳優が着ていたのと同じ上着だ。",note:"〜するのと同じ〜（asが直前の節全体を先行詞とすることもある）"},
          {en:"(b) Oil and water do not mix, <mark>as</mark> we all know.",jp:"油と水は交わらない。ご存知の通り。"},
          {en:"④ You did <em>more</em> work <mark>than</mark> I had expected.",jp:"あなたは私が期待していた以上の仕事をした。"},
        ],
        tips:["③ asは関係代名詞のように使われ、節の中で主語、補語、目的語の働きをする。","cf. I want to paint such pictures as I see in museums.（〜するような〜）","④ thanは後に続く節の中で主語や目的語の働きをする。","関係代名詞の働きをするbutは否定の意味を表す：There was no one but thought he was guilty."]
      },
      {id:"27C",badge:"C",title:"関係代名詞のさまざまな用法",formula:"",
        points:[
          {en:"⑤ The woman <mark>who I thought</mark> was her sister was actually her mother.",jp:"彼女の姉だと私が思っていた女性は、実は母親だった。",note:"関係代名詞の後にI thinkなどのほかの節(SV)が続くことがある。"},
          {en:"⑥ <em>The house</em> <mark>of which</mark> you can see the red roof is ours.",jp:"赤い屋根が見える家が私たちのものです。",note:"先行詞が(人以外)の場合、所有格のwhoseの代わりにof whichも使える（文章体）。＝The house whose red roof you can see is ours."},
        ],tips:[]
      },
      {id:"27D",badge:"D",title:"what を使った慣用表現",formula:"",
        points:[
          {en:"⑦ (a) This music is <mark>what is called</mark> \"rap.\"",jp:"この音楽はいわゆるラップというものだ。",note:"what is called「いわゆる〜」"},
          {en:"(b) His father made him <mark>what he is</mark> today.",jp:"彼の父親が今日の彼を作り上げた。",note:"what S is「現在のS」。⇔what S was[used to be]「かつてのS/昔のS」"},
          {en:"(c) He plays the piano, and <mark>what is more</mark>, he sings very well.",jp:"彼はピアノを弾くし、そのうえ歌も非常に上手だ。",note:"what is more「そのうえ」。⇔what is worse「さらに悪いことに」"},
          {en:"(d) Reading <mark>is to</mark> the mind <mark>what</mark> exercising <mark>is to</mark> the body.",jp:"読書と心の関係は、運動と体の関係に等しい。",note:"A is to B what C is to D「AのBに対する関係は、CのDに対する関係に等しい」"},
        ],tips:[]
      }
    ]
  },
  l28:{num:28,title:"仮定法 (1)",jp:"直説法vs仮定法・仮定法過去・仮定法過去完了",color:"#6b4c9e",
    desc:"現実と違うことを表す仮定法の基本。仮定法過去・仮定法過去完了の形と意味と用法。",
    sections:[
      {id:"28A",badge:"A",title:"直説法と仮定法",formula:"",
        points:[
          {en:"*① (a) If it <mark>rains</mark> tomorrow, we <mark>will cancel</mark> the picnic.",jp:"明日雨が降れば、ピクニックを中止する。",note:"直説法：現実のことや現実に起こる可能性があることを表す動詞の形。"},
          {en:"(b) If I <mark>had</mark> a lot of money, I <mark>would buy</mark> an island.",jp:"もし大金があれば、島を買うのに。",note:"仮定法：現実とは違うことを表す動詞の形。話し手が「現実味を感じない」と思った場合は仮定法を使う。"},
        ],tips:[]
      },
      {id:"28B",badge:"B",title:"仮定法過去（現在の事実と反対）「もし〜なら、…だろうに」",
        formula:"If＋S＋<b>動詞の過去形</b>, S＋<b>would[could/might]</b>＋動詞の原形",
        points:[
          {en:"② (a) If he <mark>were</mark> ready, we <mark>would go</mark>.",jp:"もし彼の準備ができていれば、私たちは行くのに。",note:"仮定法では主語の人称・数に関係なくbe動詞はwereを使う。口語ではwasも使われる。"},
          {en:"(b) If I <mark>had</mark> enough time and money, I <mark>would travel</mark> around the world.",jp:"もし時間とお金が十分あれば、世界中を旅するのに。"},
        ],
        tips:["「…だろうに」の部分の助動詞：would「…だろうに」、could「…できるのに」、might「…かもしれないのに」","主語が1人称のときはshouldを使うことができる：If I had wings, I should fly to you."]
      },
      {id:"28C",badge:"C",title:"仮定法過去完了（過去の事実と反対）「もし〜だったなら、…だっただろう」",
        formula:"If＋S＋<b>had＋過去分詞</b>, S＋<b>would[could/might] have＋過去分詞</b>",
        points:[
          {en:"③ (a) If I <mark>had left</mark> ten minutes earlier, I <mark>would not have missed</mark> the train.",jp:"もし10分早く出発していたら、電車に乗り遅れなかっただろう。"},
          {en:"(b) She <mark>would have died</mark> if the climber <mark>had not found</mark> her.",jp:"もし登山者が彼女を見つけなかったら、彼女は死んでいただろう。"},
        ],tips:[]
      },
      {id:"28D",badge:"D",title:"if節と主節で、表す時が異なる場合",formula:"",
        points:[
          {en:"④ If I <mark>had taken</mark> the medicine <em>then</em>, I <mark>might be</mark> fine <em>now</em>.",jp:"あの時薬を飲んでいたなら、今ごろ元気かもしれない。",note:"〈過去の事実に反する仮定〉を想定し、その結果〈現在の事実に反する仮定〉を表す。「もし(あの時)〜だったなら、(今は)…だろうに」。動詞の形と時を表す副詞(thenとnow)に注目。"},
        ],tips:[]
      }
    ]
  },
  l29:{num:29,title:"仮定法 (2)",jp:"wish・as if・未来の仮定法・ifの省略（倒置）",color:"#6b4c9e",
    desc:"wishやas ifの後に続く仮定法、未来の事柄を表す仮定法、ifを省略した倒置構文。",
    sections:[
      {id:"29A",badge:"A",title:"wish や as if の後の仮定法",
        formula:"I wish＋S＋<b>仮定法過去</b>（同時）／ <b>仮定法過去完了</b>（以前）",
        points:[
          {en:"① (a) I wish I <mark>knew</mark> her telephone number.",jp:"彼女の電話番号を知っていればなあ。",note:"(wish＋仮定法過去)「〜ならなあ」[「願っている時」と同時のこと]"},
          {en:"(b) I wish I <mark>hadn't bought</mark> such an expensive bag.",jp:"そんな高いバッグを買わなければよかったなあ。",note:"(wish＋仮定法過去完了)「〜だったらなあ」[「願っている時」よりも前のこと]"},
          {en:"② (a) He talks <mark>as if he were</mark> an expert in economics.",jp:"彼はまるで経済の専門家であるかのように話す。",note:"(as if[though]＋仮定法過去)「まるで〜であるかのように」[主節と同時のこと]"},
          {en:"(b) You look <mark>as if you had seen</mark> a ghost!",jp:"あなたはまるで幽霊を見たかのような顔をしている！",note:"(as if[though]＋仮定法過去完了)「まるで〜であったかのように」[主節よりも前のこと]"},
        ],
        tips:["wishの後の仮定法：実現できそうもない願望を表す。仮定法過去か仮定法過去完了かは、wishの時制とは無関係。","as ifの後に不定詞を置くこともある：Her guest suddenly stood up as if to leave."]
      },
      {id:"29B",badge:"B",title:"未来のことを表す仮定法",formula:"",

// ================================================================
const TYPE_LABEL = { mc:'四択問題', fill:'穴埋め問題', sort:'並び替え問題', write:'ライティング問題', twist:'ひねり問題' };
const TYPE_CLS   = { mc:'tb-mc', fill:'tb-fill', sort:'tb-sort', write:'tb-write', twist:'tb-twist' };

function renderQuiz(id) {
  const qs = QUIZ_BANK[id] || [];
  const st = quizState[id];
  if (!st || st.finished) return renderQuizResult(id);

  const q   = qs[st.idx];
  const pct = Math.round(st.idx / qs.length * 100);
  const star = '⭐'.repeat(q.diff);

  let ansHtml = '';
  if (q.type === 'mc') {
    // 選択肢を毎回シャッフル
    const indexed        = q.opts.map((o, i) => ({ o, i }));
    const shuffledIdx    = shuffle(indexed);
    const correctShuffled = shuffledIdx.findIndex(x => x.i === q.ans);
    ansHtml = `<div class="qopts">${shuffledIdx.map((item, si) => `
      <button class="qopt" onclick="answerMC('${id}',${si},${correctShuffled})">
        <span class="opt-ind">${String.fromCharCode(65 + si)}</span>${item.o}
      </button>`).join('')}</div>`;

  } else if (q.type === 'fill') {
    const blanks = (q.blank.match(/_+/g) || []).length;
    let inp = '';
    for (let i = 0; i < blanks; i++)
      inp += `<input class="fill-input" id="fi-${id}-${i}" placeholder="答えを入力..." />`;
    ansHtml = `${inp}<button class="submit-btn" onclick="answerFill('${id}')">確認</button>`;

  } else if (q.type === 'sort') {
    const sw = shuffle([...q.words]);
    ansHtml = `
      <div class="slot-lbl">単語バンク（クリックで追加）</div>
      <div class="sort-bank" id="bank-${id}">
        ${sw.map(w => `<button class="chip" onclick="moveChip('${id}',this,'slot')" data-word="${w}">${w}</button>`).join('')}
      </div>
      <div class="slot-lbl">回答欄（クリックで戻す）</div>
      <div class="sort-slot" id="slot-${id}"></div>
      <button class="submit-btn" onclick="answerSort('${id}')">確認</button>`;

  } else {
    ansHtml = `
      <textarea class="write-area" id="wa-${id}" placeholder="英文を入力してください..."></textarea>
      <button class="submit-btn" onclick="answerWrite('${id}')">確認する</button>`;
  }

  return `
    <div class="qprog">
      <span class="qcnt">問 ${st.idx + 1} / ${qs.length}</span>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%"></div></div>
      <span class="score-bdg">${st.score} 正解</span>
    </div>
    <div class="qcard">
      <div class="qlbl">Q${st.idx + 1} ${star}</div>
      <span class="qtbadge ${TYPE_CLS[q.type]}">${TYPE_LABEL[q.type]}</span>
      <div class="qtext">${q.q}</div>
      ${q.blank ? `<div class="qsub">${q.blank}</div>` : ''}
      ${ansHtml}
      <div class="qfb" id="qfb-${id}"></div>
    </div>
    <div class="qnav"><button class="btn-next" id="qnext-${id}" onclick="nextQ('${id}')">次の問題 →</button></div>`;
}

function renderQuizResult(id) {
  const qs = QUIZ_BANK[id] || [];
  const st = quizState[id];
  if (!st || !st.finished) return '<div style="text-align:center;color:var(--muted);padding:20px;">読み込み中...</div>';
  const pct   = Math.round(st.score / qs.length * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '💪';
  const msg   = pct >= 80 ? '素晴らしい！完璧に理解しています！'
              : pct >= 60 ? 'よくできました！苦手な箇所を復習しよう。'
              : '解説を読んでもう一度チャレンジしてみよう！';
  return `<div class="result vis">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${st.score} / ${qs.length}</div>
    <div class="result-msg">${msg}（正解率 ${pct}%）</div>
    <button class="btn-retry"     onclick="retryQuiz('${id}')">🔄 もう一度</button>
    <button class="btn-retry sec" onclick="switchTabForId('st-${id}')">📖 解説を見る</button>
  </div>`;
}

function renderAI(id) {
  const L = LESSONS_DATA[id];
  return `<div class="ai-area">
    <div class="ai-title">🤖 AIに質問する</div>
    <div class="ai-desc">「${L.title}」について何でも質問してください。英作文の添削・例文の説明・応用問題などOK！</div>
    <div class="ai-row">
      <textarea class="ai-input" id="aii-${id}" rows="2" placeholder="例：「as if の後ろはなぜ過去形？」「この英文を添削して」など"></textarea>
      <button class="ai-btn" onclick="askAI('${id}')">送信 →</button>
    </div>
    <div class="ai-loading" id="ail-${id}">
      <div class="dp"><span></span><span></span><span></span></div>AIが回答中...
    </div>
    <div class="ai-resp" id="air-${id}"></div>
  </div>`;
}

// ── クイズ回答ハンドラ ────────────────────────────────────────────
function showFeedback(id, correct, exp, model) {
  const fb  = document.getElementById(`qfb-${id}`);
  const btn = document.getElementById(`qnext-${id}`);
  if (!fb || !btn) return;
  fb.className = `qfb ${correct ? 'ok' : 'ng'} vis`;
  const modelTxt = model ? `<br><br>📝 <strong>模範解答：</strong>${model}` : '';
  fb.innerHTML = `<strong>${correct ? '✅ 正解！' : '❌ 不正解'}</strong>${exp}${modelTxt}`;
  btn.classList.add('vis');
  const st = quizState[id];
  if (correct) { st.score++; addXP(10); }
  st.answered = true;
}

function answerMC(id, selectedIdx, correctIdx) {
  if (quizState[id].answered) return;
  const q = QUIZ_BANK[id][quizState[id].idx];
  document.querySelectorAll(`#qz-${id} .qopt`).forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx)                         b.classList.add('ok');
    else if (i === selectedIdx && i !== correctIdx) b.classList.add('ng');
  });
  showFeedback(id, selectedIdx === correctIdx, q.exp, null);
}

function answerFill(id) {
  if (quizState[id].answered) return;
  const q       = QUIZ_BANK[id][quizState[id].idx];
  const answers = Array.isArray(q.ans) ? q.ans : [q.ans];
  const blanks  = (q.blank.match(/_+/g) || []).length;
  let allOk = true;
  for (let i = 0; i < blanks; i++) {
    const el  = document.getElementById(`fi-${id}-${i}`);
    if (!el) continue;
    const val = el.value.trim().toLowerCase();
    const ca  = answers[i] ? (Array.isArray(answers[i]) ? answers[i] : [answers[i]]) : [answers[0]];
    const ok  = ca.some(a => val === a.toLowerCase());
    el.classList.add(ok ? 'ok' : 'ng');
    el.disabled = true;
    if (!ok) allOk = false;
  }
  showFeedback(id, allOk, q.exp, null);
}

function moveChip(id, btn, dir) {
  if (dir === 'slot') {
    document.getElementById(`slot-${id}`).appendChild(btn);
    btn.onclick = () => moveChip(id, btn, 'bank');
    btn.classList.add('placed');
  } else {
    document.getElementById(`bank-${id}`).appendChild(btn);
    btn.onclick = () => moveChip(id, btn, 'slot');
    btn.classList.remove('placed');
  }
}

function answerSort(id) {
  if (quizState[id].answered) return;
  const q     = QUIZ_BANK[id][quizState[id].idx];
  const chips = document.getElementById(`slot-${id}`).querySelectorAll('.chip');
  const ans   = Array.from(chips).map(c => c.dataset.word).join(' ');
  const ok    = ans.toLowerCase() === q.ans.toLowerCase();
  chips.forEach(c => { c.disabled = true; });
  showFeedback(id, ok, q.exp, ok ? null : q.ans);
}

function answerWrite(id) {
  if (quizState[id].answered) return;
  const q   = QUIZ_BANK[id][quizState[id].idx];
  const val = (document.getElementById(`wa-${id}`)?.value || '').trim();
  addXP(5);
  quizState[id].answered = true;
  const fb  = document.getElementById(`qfb-${id}`);
  const btn = document.getElementById(`qnext-${id}`);
  if (fb) {
    fb.className = 'qfb ok vis';
    fb.innerHTML = `<strong>📝 あなたの回答：</strong>${val}<br><br>` +
                   `<strong>✅ 模範解答：</strong>${q.model}<br><br>` +
                   `<strong>💡 解説：</strong>${q.exp}`;
  }
  if (btn) btn.classList.add('vis');
}

function nextQ(id) {
  const qs = QUIZ_BANK[id];
  const st = quizState[id];
  if (st.idx < qs.length - 1) { st.idx++; st.answered = false; }
  else st.finished = true;
  const tab = document.getElementById(`qz-${id}`);
  if (tab) tab.innerHTML = renderQuiz(id);
}

function retryQuiz(id) {
  quizState[id] = { idx:0, score:0, answered:false, finished:false };
  const tab = document.getElementById(`qz-${id}`);
  if (tab) tab.innerHTML = renderQuiz(id);
}

function switchTabForId(tabId) {
  const tab = document.getElementById(tabId);
  if (!tab) return;
  const card = tab.closest('.lcard');
  card.querySelectorAll('.tbtn').forEach(b => b.classList.remove('act'));
  card.querySelectorAll('.tc').forEach(c   => c.classList.remove('act'));
  card.querySelectorAll('.tbtn')[0].classList.add('act');
  tab.classList.add('act');
}

async function askAI(id) {
  const L      = LESSONS_DATA[id];
  const input  = document.getElementById(`aii-${id}`);
  const loading= document.getElementById(`ail-${id}`);
  const resp   = document.getElementById(`air-${id}`);
  const btn    = input?.closest('.ai-area')?.querySelector('.ai-btn');
  const q      = input?.value.trim();
  if (!q) { input?.focus(); return; }

  if (btn) btn.disabled = true;
  if (loading) loading.classList.add('vis');
  if (resp)  { resp.classList.remove('vis'); resp.textContent = ''; }

  const sys = `あなたは日本人高校生向けの英文法専門の先生です。` +
    `今学習中のレッスン：Lesson ${L.num}「${L.title}（${L.jp}）」。` +
    `日本語でわかりやすく、具体的な例文を使い、なぜその形になるかの理由も説明してください。` +
    `英作文の添削の場合は誤りを指摘し正しい形と理由を説明してください。回答は簡潔にまとめてください。`;

  try {
    const res  = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6", max_tokens: 1000,
        system: sys,
        messages: [{ role: "user", content: q }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '回答を取得できませんでした。';
    if (resp) { resp.textContent = text; resp.classList.add('vis'); }
    addXP(5);
  } catch (e) {
    if (resp) { resp.textContent = '⚠️ 通信エラーが発生しました。もう一度お試しください。'; resp.classList.add('vis'); }
  }
  if (loading) loading.classList.remove('vis');
  if (btn) btn.disabled = false;
}

let vocabFilter = '';
let vocabSort   = 'num';

function renderVocab() {
  const grid = buildVocabGrid(getFilteredVocab());
  document.getElementById('vocabContent').innerHTML = `
    <div class="vocab-notice">
      ⚠️ <strong>登録範囲：</strong>システム英単語5訂版 <strong>1001〜1300</strong>（300語）。
      「新」マークは5訂版で新たに追加された単語です。
    </div>
    <div class="vocab-header">
      <h2>📝 システム英単語 5訂版（1001–1300）</h2>
      <p>全300語収録。検索・絞り込みで効率よく学習しましょう。</p>
    </div>
    <div class="vocab-search">
      <input type="text" placeholder="英単語・日本語で検索..." oninput="filterVocab(this.value)" />
      <select onchange="sortVocab(this.value)">
        <option value="num">番号順</option>
        <option value="en">英語順 (A–Z)</option>
        <option value="jp">日本語順</option>
        <option value="new">新単語のみ</option>
      </select>
    </div>
    <div id="vocabGrid" class="vocab-grid">${grid}</div>
    <div class="vocab-quiz-area">
      <div class="qlbl" style="margin-bottom:10px;">🎯 単語確認クイズ（全 ${VOCAB.length} 問）</div>
      <div id="vocabQuizContent">${renderVocabQuiz()}</div>
    </div>`;
}

function buildVocabGrid(arr) {
  return arr.map(v => `
    <div class="vc">
      <div class="vc-num">No. ${v.id}${v.isNew ? '<span class="vc-new">新</span>' : ''}</div>
      <div class="vc-en">${v.en}</div>
      <div class="vc-jp">${v.jp}</div>
    </div>`).join('');
}

function getFilteredVocab() {
  let arr = [...VOCAB];
  if (vocabFilter) arr = arr.filter(v =>
    v.en.toLowerCase().includes(vocabFilter.toLowerCase()) || v.jp.includes(vocabFilter));
  if      (vocabSort === 'en')  arr.sort((a, b) => a.en.localeCompare(b.en));
  else if (vocabSort === 'jp')  arr.sort((a, b) => a.jp.localeCompare(b.jp));
  else if (vocabSort === 'new') arr = arr.filter(v => v.isNew);
  else arr.sort((a, b) => a.id - b.id);
  return arr;
}

function filterVocab(val) {
  vocabFilter = val;
  const grid = document.getElementById('vocabGrid');
  if (grid) grid.innerHTML = buildVocabGrid(getFilteredVocab());
}

function sortVocab(val) {
  vocabSort = val;
  filterVocab(vocabFilter);
}

// ── 単語クイズ ─────────────────────────────────────────────────────
function buildVQBank() {
  return shuffle(VOCAB).map(v => {
    const wrongs = VOCAB.filter(x => x.id !== v.id).sort(() => Math.random() - .5).slice(0, 3).map(x => x.jp);
    const opts   = shuffle([v.jp, ...wrongs]);
    return { q: `次の英単語の意味は？\n「${v.en}」`, opts, ans: v.jp, exp: `${v.en}：${v.jp}` };
  });
}

function renderVocabQuiz() {
  if (!vqBank.length) vqBank = buildVQBank();
  if (vqState.finished) {
    const pct = Math.round(vqState.score / vqBank.length * 100);
    return `<div class="result vis">
      <div class="result-emoji">${pct >= 80 ? '🏆' : '💪'}</div>
      <div class="result-score">${vqState.score} / ${vqBank.length}</div>
      <div class="result-msg">正解率 ${pct}%</div>
      <button class="btn-retry" onclick="retryVQ()">🔄 もう一度</button>
    </div>`;
  }
  const q   = vqBank[vqState.idx];
  const pct = Math.round(vqState.idx / vqBank.length * 100);
  return `
    <div class="qprog">
      <span class="qcnt">問 ${vqState.idx + 1} / ${vqBank.length}</span>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%"></div></div>
      <span class="score-bdg">${vqState.score} 正解</span>
    </div>
    <div class="qcard">
      <div class="qlbl">単語クイズ</div>
      <div class="qtext">${q.q}</div>
      <div class="qopts">${q.opts.map((o, i) => `
        <button class="qopt" onclick="answerVQ(${i})">
          <span class="opt-ind">${String.fromCharCode(65 + i)}</span>${o}
        </button>`).join('')}</div>
      <div class="qfb" id="vqfb"></div>
    </div>
    <div class="qnav"><button class="btn-next" id="vqnext" onclick="nextVQ()">次の問題 →</button></div>`;
}

function answerVQ(idx) {
  if (vqState.answered) return;
  vqState.answered = true;
  const q       = vqBank[vqState.idx];
  const correct = q.opts[idx] === q.ans;
  document.querySelectorAll('#vocabQuizContent .qopt').forEach((b, i) => {
    b.disabled = true;
    if (q.opts[i] === q.ans) b.classList.add('ok');
    else if (i === idx && !correct) b.classList.add('ng');
  });
  const fb  = document.getElementById('vqfb');
  const btn = document.getElementById('vqnext');
  if (fb)  { fb.className = `qfb ${correct ? 'ok' : 'ng'} vis`; fb.innerHTML = `<strong>${correct ? '✅ 正解！' : '❌ 不正解'}</strong>${q.exp}`; }
  if (btn) btn.classList.add('vis');
  if (correct) { vqState.score++; addXP(10); }
}

function nextVQ() {
  if (vqState.idx < vqBank.length - 1) { vqState.idx++; vqState.answered = false; }
  else vqState.finished = true;
  document.getElementById('vocabQuizContent').innerHTML = renderVocabQuiz();
}

function retryVQ() {
  vqBank  = buildVQBank();
  vqState = { idx:0, score:0, answered:false, finished:false };
  document.getElementById('vocabQuizContent').innerHTML = renderVocabQuiz();
}

// ================================================================
// 期末テスト
// ================================================================
const EXAM_CFG = {
  vocab: { count:15, pts:1 },  // 15問×1点=15点
  mc:    { count:10, pts:2 },  // 10問×2点=20点
  fill:  { count:10, pts:2 },  // 10問×2点=20点
  sort:  { count:5,  pts:3 },  //  5問×3点=15点
  write: { count:5,  pts:3 },  //  5問×3点=15点
  twist: { count:5,  pts:3 },  //  5問×3点=15点
  total: 100
};

function renderExamHome() {
  document.getElementById('examContent').innerHTML = `
    <div class="exam-home">
      <h2>📋 期末テスト（ランダム生成）</h2>
      <p>毎回ランダムに問題・選択肢が変わります。全10レッスン＋単語から出題。満点100点！</p>
      <div class="exam-stats">
        <div class="estat"><div class="estat-num">15問</div><div class="estat-pts">×1点</div><div class="estat-lbl">英単語</div></div>
        <div class="estat"><div class="estat-num">10問</div><div class="estat-pts">×2点</div><div class="estat-lbl">四択問題</div></div>
        <div class="estat"><div class="estat-num">10問</div><div class="estat-pts">×2点</div><div class="estat-lbl">穴埋め問題</div></div>
        <div class="estat"><div class="estat-num">5問</div><div class="estat-pts">×3点</div><div class="estat-lbl">並び替え</div></div>
        <div class="estat"><div class="estat-num">5問</div><div class="estat-pts">×3点</div><div class="estat-lbl">ライティング</div></div>
        <div class="estat"><div class="estat-num">5問</div><div class="estat-pts">×3点</div><div class="estat-lbl">ひねり問題</div></div>
      </div>
      <button class="start-btn" onclick="startExam()">🎯 テストを開始する</button>
    </div>`;
}

function startExam() {
  const allQ = { mc:[], fill:[], sort:[], write:[], twist:[] };
  Object.values(QUIZ_BANK).forEach(qs => qs.forEach(q => { if (allQ[q.type]) allQ[q.type].push(q); }));

  // 単語問題（毎回シャッフルした選択肢）
  const vqAll = VOCAB.map(v => {
    const wrongs = VOCAB.filter(x => x.id !== v.id).sort(() => Math.random() - .5).slice(0, 3).map(x => x.jp);
    const opts   = shuffle([v.jp, ...wrongs]);
    return { q:`次の英単語の意味は？\n「${v.en}」`, opts, ans:v.jp, exp:`${v.en}：${v.jp}` };
  });

  examState = {
    vocabQs: pickRandom(vqAll,    EXAM_CFG.vocab.count),
    mcQs:    pickRandom(allQ.mc,  EXAM_CFG.mc.count),
    fillQs:  pickRandom(allQ.fill,EXAM_CFG.fill.count),
    sortQs:  pickRandom(allQ.sort,EXAM_CFG.sort.count),
    writeQs: pickRandom(allQ.write,EXAM_CFG.write.count),
    twistQs: pickRandom(allQ.twist,EXAM_CFG.twist.count),
    answers: {},
    submitted: false
  };
  renderExamPaper();
}

function renderExamPaper() {
  const es = examState;
  const SC = { vocab:'#3d52a0', mc:'#5563a8', fill:'#28a745', sort:'#fd7e14', write:'#dc3545', twist:'#6b4c9e' };

  // 英単語セクション（選択肢シャッフル済み）
  const vocabItems = es.vocabQs.map((q, i) => `
    <div class="eqi" id="eq-vocab-${i}">
      <div class="eqi-lbl">英単語 第${i+1}問（1点）</div>
      <div class="eqi-txt">${q.q}</div>
      <div class="exam-opts">${q.opts.map((o, oi) => `
        <button class="exam-opt" onclick="selExamOpt('vocab',${i},${oi},this)">
          <span class="eoi">${String.fromCharCode(65+oi)}</span>${o}
        </button>`).join('')}</div>
      <div class="efb" id="efb-vocab-${i}"></div>
    </div>`).join('');

  // 四択セクション（選択肢を毎回シャッフル・正解インデックスをdata属性に保存）
  const mcItems = es.mcQs.map((q, i) => {
    const indexed = q.opts.map((o, oi) => ({ o, oi }));
    const sh      = shuffle(indexed);
    const corrSh  = sh.findIndex(x => x.oi === q.ans);
    return `
      <div class="eqi" id="eq-mc-${i}">
        <div class="eqi-lbl">四択問題 第${i+1}問（2点）</div>
        <div class="eqi-txt">${q.q}${q.blank ? '\n' + q.blank : ''}</div>
        <div class="exam-opts" data-correct="${corrSh}">
          ${sh.map((item, si) => `
            <button class="exam-opt" onclick="selExamOpt('mc',${i},${si},this)">
              <span class="eoi">${String.fromCharCode(65+si)}</span>${item.o}
            </button>`).join('')}
        </div>
        <div class="efb" id="efb-mc-${i}"></div>
      </div>`;
  }).join('');

  // 穴埋めセクション
  const fillItems = es.fillQs.map((q, i) => {
    const blanks = (q.blank.match(/_+/g) || []).length;
    let inp = '';
    for (let b = 0; b < blanks; b++)
      inp += `<input class="exam-input" id="efi-fill-${i}-${b}" placeholder="答えを入力..." />`;
    return `
      <div class="eqi" id="eq-fill-${i}">
        <div class="eqi-lbl">穴埋め問題 第${i+1}問（2点）</div>
        <div class="eqi-txt">${q.q}\n${q.blank}</div>
        ${inp}
        <div class="efb" id="efb-fill-${i}"></div>
      </div>`;
  }).join('');

  // 並び替えセクション（単語をシャッフル）
  const sortItems = es.sortQs.map((q, i) => {
    const sw = shuffle([...q.words]);
    return `
      <div class="eqi" id="eq-sort-${i}">
        <div class="eqi-lbl">並び替え問題 第${i+1}問（3点）</div>
        <div class="eqi-txt">${q.q}</div>
        <div class="slot-lbl">単語バンク</div>
        <div class="esb" id="esb-sort-${i}">
          ${sw.map(w => `<button class="ec" onclick="moveEC('sort',${i},this,'slot')" data-word="${w}">${w}</button>`).join('')}
        </div>
        <div class="slot-lbl">回答欄</div>
        <div class="ess" id="ess-sort-${i}"></div>
        <div class="efb" id="efb-sort-${i}"></div>
      </div>`;
  }).join('');

  // ライティング・ひねりセクション
  const writeItems = es.writeQs.map((q, i) => `
    <div class="eqi" id="eq-write-${i}">
      <div class="eqi-lbl">ライティング問題 第${i+1}問（3点）</div>
      <div class="eqi-txt">${q.q}</div>
      <textarea class="exam-textarea" id="eta-write-${i}" placeholder="英文を入力..."></textarea>
      <div class="efb" id="efb-write-${i}"></div>
    </div>`).join('');

  const twistItems = es.twistQs.map((q, i) => `
    <div class="eqi" id="eq-twist-${i}">
      <div class="eqi-lbl">ひねり問題 第${i+1}問（3点）</div>
      <div class="eqi-txt">${q.q}</div>
      <textarea class="exam-textarea" id="eta-twist-${i}" placeholder="英文を入力..."></textarea>
      <div class="efb" id="efb-twist-${i}"></div>
    </div>`).join('');

  document.getElementById('examContent').innerHTML = `
    <div class="ep-bar-row">
      <span class="ep-lbl">進行状況</span>
      <div class="ep-bw"><div class="ep-b" id="examPB" style="width:0%"></div></div>
      <span class="ep-n" id="examPN">採点前</span>
    </div>
    <div class="exam-sec-card">
      <div class="exam-sec-hdr" style="background:${SC.vocab}">📝 第1問 英単語（15問 × 1点 ＝ 15点）</div>
      <div class="exam-sec-body">${vocabItems}</div>
    </div>
    <div class="exam-sec-card">
      <div class="exam-sec-hdr" style="background:${SC.mc}">📋 第2問 四択問題（10問 × 2点 ＝ 20点）</div>
      <div class="exam-sec-body">${mcItems}</div>
    </div>
    <div class="exam-sec-card">
      <div class="exam-sec-hdr" style="background:${SC.fill}">✏️ 第3問 穴埋め問題（10問 × 2点 ＝ 20点）</div>
      <div class="exam-sec-body">${fillItems}</div>
    </div>
    <div class="exam-sec-card">
      <div class="exam-sec-hdr" style="background:${SC.sort}">🔀 第4問 並び替え問題（5問 × 3点 ＝ 15点）</div>
      <div class="exam-sec-body">${sortItems}</div>
    </div>
    <div class="exam-sec-card">
      <div class="exam-sec-hdr" style="background:${SC.write}">📝 第5問 ライティング問題（5問 × 3点 ＝ 15点）</div>
      <div class="exam-sec-body">${writeItems}</div>
    </div>
    <div class="exam-sec-card">
      <div class="exam-sec-hdr" style="background:${SC.twist}">🌀 第6問 ひねり問題（5問 × 3点 ＝ 15点）</div>
      <div class="exam-sec-body">${twistItems}</div>
    </div>
    <div class="exam-submit-wrap">
      <button class="exam-submit-btn" onclick="submitExam()">📊 採点する</button>
    </div>`;
}

function selExamOpt(cat, idx, optIdx, btn) {
  if (examState.submitted) return;
  document.getElementById(`eq-${cat}-${idx}`).querySelectorAll('.exam-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  if (!examState.answers[cat]) examState.answers[cat] = {};
  examState.answers[cat][idx] = optIdx;
}

function moveEC(cat, idx, btn, dir) {
  if (examState.submitted) return;
  if (dir === 'slot') {
    document.getElementById(`ess-${cat}-${idx}`).appendChild(btn);
    btn.onclick = () => moveEC(cat, idx, btn, 'bank');
    btn.classList.add('placed');
  } else {
    document.getElementById(`esb-${cat}-${idx}`).appendChild(btn);
    btn.onclick = () => moveEC(cat, idx, btn, 'slot');
    btn.classList.remove('placed');
  }
}

function submitExam() {
  const es = examState;
  if (es.submitted) return;
  es.submitted = true;
  let total = 0;
  const bd  = { vocab:0, mc:0, fill:0, sort:0, write:0, twist:0 };

  // ── 英単語採点 ──────────────────────────────────────────────
  es.vocabQs.forEach((q, i) => {
    const sel = es.answers.vocab?.[i] ?? -1;
    const ok  = sel >= 0 && q.opts[sel] === q.ans;
    document.getElementById(`eq-vocab-${i}`)?.querySelectorAll('.exam-opt').forEach((b, bi) => {
      b.disabled = true;
      if (q.opts[bi] === q.ans)   b.classList.add('ex-ok');
      else if (bi === sel && !ok) b.classList.add('ex-ng');
    });
    const fb = document.getElementById(`efb-vocab-${i}`);
    if (fb) { fb.className = `efb ${ok?'ok':'ng'} vis`; fb.innerHTML = `${ok?'✅ 正解':'❌ 不正解'}：${q.exp}`; }
    if (ok) { total += EXAM_CFG.vocab.pts; bd.vocab += EXAM_CFG.vocab.pts; }
  });

  // ── 四択採点 ────────────────────────────────────────────────
  es.mcQs.forEach((q, i) => {
    const wrap    = document.getElementById(`eq-mc-${i}`);
    const optsEl  = wrap?.querySelector('.exam-opts');
    const corrSh  = optsEl ? parseInt(optsEl.dataset.correct) : -1;
    const sel     = es.answers.mc?.[i] ?? -1;
    const ok      = sel === corrSh;
    wrap?.querySelectorAll('.exam-opt').forEach((b, bi) => {
      b.disabled = true;
      if (bi === corrSh)          b.classList.add('ex-ok');
      else if (bi === sel && !ok) b.classList.add('ex-ng');
    });
    const fb = document.getElementById(`efb-mc-${i}`);
    if (fb) { fb.className = `efb ${ok?'ok':'ng'} vis`; fb.innerHTML = `${ok?'✅ 正解':'❌ 不正解'}：${q.exp}`; }
    if (ok) { total += EXAM_CFG.mc.pts; bd.mc += EXAM_CFG.mc.pts; }
  });

  // ── 穴埋め採点 ──────────────────────────────────────────────
  es.fillQs.forEach((q, i) => {
    const answers = Array.isArray(q.ans) ? q.ans : [q.ans];
    const blanks  = (q.blank.match(/_+/g) || []).length;
    let allOk = true;
    for (let b = 0; b < blanks; b++) {
      const el  = document.getElementById(`efi-fill-${i}-${b}`);
      if (!el) continue;
      const val = el.value.trim().toLowerCase();
      const ca  = answers[b] ? (Array.isArray(answers[b]) ? answers[b] : [answers[b]]) : [answers[0]];
      const ok  = ca.some(a => val === a.toLowerCase());
      el.classList.add(ok ? 'ex-ok' : 'ex-ng');
      el.disabled = true;
      if (!ok) allOk = false;
    }
    const fb = document.getElementById(`efb-fill-${i}`);
    if (fb) { fb.className = `efb ${allOk?'ok':'ng'} vis`; fb.innerHTML = `${allOk?'✅ 正解':'❌ 不正解'}：${q.exp}${!allOk?'<br>正解：'+q.ans:''}`; }
    if (allOk) { total += EXAM_CFG.fill.pts; bd.fill += EXAM_CFG.fill.pts; }
  });

  // ── 並び替え採点 ────────────────────────────────────────────
  es.sortQs.forEach((q, i) => {
    const chips = document.getElementById(`ess-sort-${i}`)?.querySelectorAll('.ec') || [];
    const ans   = Array.from(chips).map(c => c.dataset.word).join(' ');
    const ok    = ans.toLowerCase() === q.ans.toLowerCase();
    chips.forEach(c => { c.disabled = true; });
    const fb = document.getElementById(`efb-sort-${i}`);
    if (fb) { fb.className = `efb ${ok?'ok':'ng'} vis`; fb.innerHTML = `${ok?'✅ 正解':'❌ 不正解'}：${q.exp}${!ok?'<br>正解：'+q.ans:''}`; }
    if (ok) { total += EXAM_CFG.sort.pts; bd.sort += EXAM_CFG.sort.pts; }
  });

  // ── ライティング（自己採点・模範解答提示） ──────────────────
  es.writeQs.forEach((q, i) => {
    const ta  = document.getElementById(`eta-write-${i}`);
    const val = ta?.value?.trim() || '（未回答）';
    const fb  = document.getElementById(`efb-write-${i}`);
    if (fb) fb.className = 'efb ok vis',
            fb.innerHTML = `📝 <b>あなたの回答：</b>${val}<br><br>` +
                           `✅ <b>模範解答：</b>${q.model}<br><br>` +
                           `💡 <b>解説：</b>${q.exp}<br>` +
                           `<span style="font-size:10px;color:#155724;">※模範解答と照らし合わせて自己採点してください</span>`;
    if (ta) ta.disabled = true;
    total += EXAM_CFG.write.pts; bd.write += EXAM_CFG.write.pts;
  });

  // ── ひねり問題（自己採点・模範解答提示） ────────────────────
  es.twistQs.forEach((q, i) => {
    const ta  = document.getElementById(`eta-twist-${i}`);
    const val = ta?.value?.trim() || '（未回答）';
    const fb  = document.getElementById(`efb-twist-${i}`);
    if (fb) fb.className = 'efb ok vis',
            fb.innerHTML = `📝 <b>あなたの回答：</b>${val}<br><br>` +
                           `✅ <b>模範解答：</b>${q.model}<br><br>` +
                           `💡 <b>解説：</b>${q.exp}<br>` +
                           `<span style="font-size:10px;color:#155724;">※模範解答と照らし合わせて自己採点してください</span>`;
    if (ta) ta.disabled = true;
    total += EXAM_CFG.twist.pts; bd.twist += EXAM_CFG.twist.pts;
  });

  document.getElementById('examPB').style.width = '100%';
  document.getElementById('examPN').textContent = `${total}点 / 100点`;
  addXP(50);

  const emoji = total >= 90 ? '🏆' : total >= 70 ? '😊' : total >= 50 ? '💪' : '📚';
  const msg   = total >= 90 ? '優秀！素晴らしい成績です！'
              : total >= 70 ? 'よくできました！苦手箇所を復習しよう。'
              : total >= 50 ? 'もう少し！解説をしっかり読んで再チャレンジ。'
              : '解説をしっかり読んで基礎から復習しよう。';

  const summary = document.createElement('div');
  summary.className = 'exam-result';
  summary.innerHTML = `
    <div class="er-emoji">${emoji}</div>
    <div class="er-score">${total}</div>
    <div class="er-total">/ 100点　${msg}</div>
    <div class="er-bd">
      <div class="er-bdi"><div class="er-bdi-n" style="color:var(--indigo)">${bd.vocab}/15</div><div class="er-bdi-l">英単語</div></div>
      <div class="er-bdi"><div class="er-bdi-n" style="color:var(--indigo)">${bd.mc}/20</div><div class="er-bdi-l">四択</div></div>
      <div class="er-bdi"><div class="er-bdi-n" style="color:var(--green)">${bd.fill}/20</div><div class="er-bdi-l">穴埋め</div></div>
      <div class="er-bdi"><div class="er-bdi-n" style="color:#fd7e14">${bd.sort}/15</div><div class="er-bdi-l">並び替え</div></div>
      <div class="er-bdi"><div class="er-bdi-n" style="color:var(--red)">${bd.write}/15</div><div class="er-bdi-l">ライティング</div></div>
      <div class="er-bdi"><div class="er-bdi-n" style="color:#6b4c9e">${bd.twist}/15</div><div class="er-bdi-l">ひねり</div></div>
    </div>
    <p style="font-size:11px;color:var(--muted);">※ライティング・ひねり問題は模範解答と照らし合わせてご自身で採点ください。</p>
    <button class="start-btn" style="font-size:13px;padding:10px 24px;margin-top:12px;" onclick="renderExamHome()">
      🔄 もう一度テストを受ける
    </button>`;
  document.getElementById('examContent').prepend(summary);
  summary.scrollIntoView({ behavior: 'smooth' });
}
