<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法マスター | Lessons 21–30</title>
<style>
:root{
  --navy:#1a2340;--indigo:#3d52a0;--sky:#7091e6;
  --cream:#f7f8fc;--gold:#f0a500;--goldl:#ffd580;
  --green:#28a745;--red:#dc3545;
  --text:#1a2340;--muted:#6b7a9e;--border:#dde3f0;
  --sh:0 4px 20px rgba(26,35,64,.10);--shl:0 8px 32px rgba(26,35,64,.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;position:sticky;top:0;z-index:200;box-shadow:var(--shl);}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;gap:10px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ico{width:32px;height:32px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--navy);}
.logo-txt{font-size:15px;font-weight:700;}
.logo-sub{font-size:10px;opacity:.7;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.xp-badge{background:var(--gold);color:var(--navy);padding:3px 11px;border-radius:20px;font-weight:700;font-size:12px;}
.nav-tab{display:flex;gap:3px;}
.ntb{padding:5px 12px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;background:rgba(255,255,255,.15);color:#fff;}
.ntb.act,.ntb:hover{background:var(--gold);color:var(--navy);}

/* LAYOUT */
.page{display:none;}
.page.act{display:block;}
.app{display:flex;max-width:1180px;margin:0 auto;padding:18px 14px;gap:18px;align-items:flex-start;}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;position:sticky;top:64px;}
.sb-sec{background:#fff;border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:12px;}
.sb-title{background:var(--navy);color:#fff;padding:8px 13px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.lb{display:block;width:100%;padding:8px 13px;border:none;background:none;text-align:left;cursor:pointer;font-size:11px;color:var(--text);border-left:3px solid transparent;transition:.2s;border-bottom:1px solid var(--border);line-height:1.4;}
.lb:last-child{border-bottom:none;}
.lb:hover{background:#f0f4ff;border-left-color:var(--sky);}
.lb.act{background:#eef2ff;border-left-color:var(--indigo);color:var(--indigo);font-weight:700;}
.ln{display:inline-block;background:var(--indigo);color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;margin-right:4px;font-weight:600;}
.lb.act .ln{background:var(--gold);color:var(--navy);}

/* MAIN */
.main{flex:1;min-width:0;}
.lcard{background:#fff;border-radius:16px;box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;}
.lhdr{padding:16px 20px;color:#fff;}
.lhdr-label{font-size:10px;font-weight:700;letter-spacing:2px;opacity:.7;text-transform:uppercase;margin-bottom:3px;}
.lhdr-title{font-size:18px;font-weight:700;}
.lhdr-title .jp{font-size:12px;opacity:.85;font-weight:400;margin-left:6px;}
.lhdr-desc{font-size:11px;margin-top:5px;opacity:.8;line-height:1.6;}

/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--border);}
.tbtn{flex:1;padding:10px 4px;border:none;background:none;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;}
.tbtn:hover{color:var(--indigo);}
.tbtn.act{color:var(--indigo);border-bottom-color:var(--indigo);font-weight:700;}
.tc{padding:20px;display:none;}
.tc.act{display:block;}

/* GRAMMAR */
.gsec{margin-bottom:20px;border-left:4px solid var(--sky);padding-left:13px;}
.gsec-title{font-size:12px;font-weight:700;color:var(--indigo);margin-bottom:9px;display:flex;align-items:flex-start;gap:6px;line-height:1.4;}
.gbadge{display:inline-flex;align-items:center;justify-content:center;min-width:19px;height:19px;background:var(--indigo);color:#fff;border-radius:50%;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.formula{background:var(--navy);color:#fff;border-radius:7px;padding:9px 13px;margin:7px 0;font-size:11px;line-height:1.8;}
.formula b{color:var(--goldl);}
.ex{background:#f8f9ff;border-radius:7px;padding:11px 13px;margin-bottom:7px;border:1px solid #e8ecf8;}
.ex-en{font-size:13px;font-weight:500;color:var(--navy);line-height:1.7;}
.ex-en mark{background:#dde8ff;color:var(--indigo);font-weight:700;border-radius:3px;padding:1px 3px;font-style:normal;}
.ex-en em{color:#888;font-style:italic;}
.ex-jp{font-size:11px;color:var(--muted);margin-top:3px;}
.ex-note{font-size:11px;color:#5d4a00;background:#fff9e6;border:1px solid #ffd54f;border-radius:5px;padding:6px 9px;margin-top:5px;line-height:1.6;}
.ex-note::before{content:"💡 ";}
.ex-hint{font-size:11px;color:#1a5c2a;background:#e8f8ed;border:1px solid #b2dfdb;border-radius:5px;padding:6px 9px;margin-top:5px;line-height:1.6;}

.tips-box{background:#f0f4ff;border-radius:7px;padding:9px 13px;margin-top:8px;}
.tips-box p{font-size:11px;color:var(--navy);line-height:1.7;margin-bottom:2px;}
.tips-box p::before{content:"▶ ";}

/* AI */
.ai-area{background:linear-gradient(135deg,#f0f4ff,#e8ecff);border-radius:12px;padding:16px;border:1px solid #d0dafe;}
.ai-title{font-size:12px;font-weight:700;color:var(--indigo);margin-bottom:10px;}
.ai-desc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6;}
.ai-row{display:flex;gap:8px;margin-bottom:8px;}
.ai-input{flex:1;padding:8px 11px;border:2px solid #c5d0f8;border-radius:7px;font-size:12px;background:#fff;outline:none;transition:.2s;resize:none;min-height:40px;}
.ai-input:focus{border-color:var(--indigo);}
.ai-btn{padding:8px 14px;background:var(--indigo);color:#fff;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap;}
.ai-btn:hover{background:var(--navy);}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;}
.ai-loading{display:none;align-items:center;gap:6px;font-size:11px;color:var(--muted);padding:3px 0;}
.ai-loading.vis{display:flex;}
.dp span{display:inline-block;width:5px;height:5px;background:var(--sky);border-radius:50%;margin:0 2px;animation:dp 1.2s infinite;}
.dp span:nth-child(2){animation-delay:.2s;}.dp span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-resp{background:#fff;border-radius:7px;padding:11px;font-size:12px;line-height:1.8;color:var(--text);border:1px solid #d0dafe;white-space:pre-wrap;display:none;margin-top:6px;}
.ai-resp.vis{display:block;}

/* QUIZ */
.qprog{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.qcnt{font-size:11px;color:var(--muted);}
.pbar-wrap{flex:1;height:6px;background:var(--border);border-radius:10px;margin:0 10px;overflow:hidden;}
.pbar{height:100%;background:linear-gradient(90deg,var(--sky),var(--indigo));border-radius:10px;transition:.4s;}
.score-bdg{background:var(--gold);color:var(--navy);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.qcard{background:#f8f9ff;border-radius:11px;padding:16px;border:1px solid var(--border);margin-bottom:12px;}
.qlbl{font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--sky);text-transform:uppercase;margin-bottom:6px;}
.qtbadge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:7px;}
.tb-mc{background:#e8ecff;color:var(--indigo);}
.tb-fill{background:#e8f8ed;color:#155724;}
.tb-sort{background:#fff3cd;color:#856404;}
.tb-write{background:#fde8ec;color:#721c24;}
.tb-twist{background:#f3e8ff;color:#5a21a8;}
.qtext{font-size:14px;font-weight:600;line-height:1.7;color:var(--navy);margin-bottom:4px;white-space:pre-wrap;}
.qsub{font-size:12px;color:#555;margin-bottom:12px;font-style:italic;}
.qopts{display:grid;gap:7px;}
.qopt{padding:10px 13px;border:2px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;text-align:left;transition:.2s;display:flex;align-items:center;gap:8px;color:var(--text);}
.qopt:hover:not(:disabled){border-color:var(--sky);background:#f0f4ff;}
.qopt.ok{border-color:var(--green);background:#e8f8ed;color:#155724;}
.qopt.ng{border-color:var(--red);background:#fde8ec;color:#721c24;}
.qopt:disabled{cursor:default;}
.opt-ind{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:.2s;color:var(--muted);}
.qopt:hover:not(:disabled) .opt-ind{border-color:var(--sky);color:var(--sky);}
.qopt.ok .opt-ind{border-color:var(--green);background:var(--green);color:#fff;}
.qopt.ng .opt-ind{border-color:var(--red);background:var(--red);color:#fff;}
.fill-input{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:.2s;margin-bottom:8px;}
.fill-input:focus{border-color:var(--indigo);}
.fill-input.ok{border-color:var(--green);background:#e8f8ed;}
.fill-input.ng{border-color:var(--red);background:#fde8ec;}
.sort-bank{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:#f0f4ff;border-radius:8px;min-height:42px;margin-bottom:7px;border:2px dashed #c5d0f8;}
.sort-slot{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:#fff;border-radius:8px;min-height:42px;border:2px dashed var(--border);margin-bottom:8px;}
.slot-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.chip{padding:5px 10px;background:var(--indigo);color:#fff;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;user-select:none;border:none;}
.chip:hover{background:var(--navy);}
.chip.placed{background:#28a745;}
.chip.disabled{background:#aaa;cursor:default;}
.write-area{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:.2s;resize:vertical;min-height:72px;margin-bottom:8px;font-family:inherit;}
.write-area:focus{border-color:var(--indigo);}
.submit-btn{padding:8px 18px;background:var(--indigo);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:.2s;}
.submit-btn:hover{background:var(--navy);}
.qfb{padding:11px 13px;border-radius:8px;font-size:12px;line-height:1.7;margin-top:9px;display:none;}
.qfb.ok{background:#e8f8ed;border:1px solid #b2dfdb;color:#155724;}
.qfb.ng{background:#fde8ec;border:1px solid #f5c6cb;color:#721c24;}
.qfb.vis{display:block;}
.qfb strong{display:block;margin-bottom:3px;}
.qnav{display:flex;justify-content:flex-end;margin-top:12px;}
.btn-next{padding:8px 20px;background:var(--indigo);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:.2s;display:none;align-items:center;gap:5px;}
.btn-next:hover{background:var(--navy);}
.btn-next.vis{display:inline-flex;}

/* RESULT */
.result{text-align:center;padding:32px 16px;display:none;}
.result.vis{display:block;}
.result-emoji{font-size:52px;margin-bottom:12px;}
.result-score{font-size:40px;font-weight:700;color:var(--indigo);margin-bottom:5px;}
.result-msg{font-size:13px;color:var(--muted);margin-bottom:20px;}
.btn-retry{padding:10px 22px;background:var(--indigo);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;margin:0 4px;}
.btn-retry:hover{background:var(--navy);}
.btn-retry.sec{background:#fff;color:var(--indigo);border:2px solid var(--indigo);}

/* VOCAB PAGE */
.vocab-page{max-width:1180px;margin:0 auto;padding:18px 14px;}
.vocab-search-bar{display:flex;gap:8px;margin-bottom:12px;}
.vocab-search-input{flex:1;padding:9px 14px;border:2px solid var(--border);border-radius:9px;font-size:13px;outline:none;transition:.2s;font-family:inherit;}
.vocab-search-input:focus{border-color:var(--indigo);}
.vocab-search-btn{padding:9px 16px;background:var(--indigo);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;}
.vocab-header{background:#fff;border-radius:14px;box-shadow:var(--sh);padding:18px 22px;margin-bottom:16px;}
.vocab-header h2{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.vocab-header p{font-size:12px;color:var(--muted);line-height:1.6;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:16px;}
.vc{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:12px 14px;border-left:4px solid var(--gold);transition:.2s;}
.vc:hover{transform:translateY(-2px);box-shadow:var(--shl);}
.vc.new-word{border-left-color:var(--sky);}
.vc-num{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:2px;}
.vc-new-badge{display:inline-block;background:var(--sky);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle;}
.vc-en{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:1px;}
.vc-pron{font-size:11px;color:var(--sky);margin-bottom:4px;}
.vc-jp{font-size:13px;color:var(--text);font-weight:600;}

/* VOCAB QUIZ */
.vocab-quiz-area{background:#fff;border-radius:14px;box-shadow:var(--sh);padding:20px;margin-bottom:16px;border:2px solid var(--gold);}
.vq-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px;}

/* EXAM PAGE */
.exam-page{max-width:900px;margin:0 auto;padding:18px 14px;}
.exam-home{background:#fff;border-radius:16px;box-shadow:var(--sh);padding:32px 24px;text-align:center;}
.exam-home h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.exam-home p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
.exam-stats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.estat{background:#f0f4ff;border-radius:10px;padding:10px 14px;text-align:center;min-width:80px;}
.estat-num{font-size:18px;font-weight:700;color:var(--indigo);}
.estat-pts{font-size:14px;font-weight:700;color:var(--gold);}
.estat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.start-btn{padding:13px 34px;background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 14px rgba(61,82,160,.3);}
.start-btn:hover{transform:translateY(-2px);}
.exam-progress-bar{background:#fff;border-radius:10px;padding:10px 16px;box-shadow:var(--sh);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.ep-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.ep-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:10px;overflow:hidden;}
.ep-bar{height:100%;background:linear-gradient(90deg,var(--sky),var(--indigo));border-radius:10px;transition:.4s;}
.ep-num{font-size:11px;color:var(--indigo);font-weight:700;white-space:nowrap;}
.exam-section-card{background:#fff;border-radius:12px;box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;}
.exam-sec-header{padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;}
.exam-sec-body{padding:16px;}
.exam-qitem{margin-bottom:16px;padding:13px;background:#f8f9ff;border-radius:9px;border:1px solid var(--border);}
.exam-qitem:last-child{margin-bottom:0;}
.exam-q-lbl{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.exam-qtext{font-size:13px;font-weight:600;color:var(--navy);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;}
.exam-opts{display:grid;gap:6px;}
.exam-opt{padding:9px 12px;border:2px solid var(--border);border-radius:7px;background:#fff;font-size:12px;cursor:pointer;text-align:left;transition:.2s;display:flex;align-items:center;gap:7px;}
.exam-opt:hover{border-color:var(--sky);background:#f0f4ff;}
.exam-opt.sel{border-color:var(--indigo);background:#eef2ff;}
.exam-opt.ex-ok{border-color:var(--green);background:#e8f8ed;}
.exam-opt.ex-ng{border-color:var(--red);background:#fde8ec;}
.exam-opt-ind{width:19px;height:19px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;transition:.2s;color:var(--muted);}
.exam-opt.sel .exam-opt-ind{border-color:var(--indigo);background:var(--indigo);color:#fff;}
.exam-opt.ex-ok .exam-opt-ind{border-color:var(--green);background:var(--green);color:#fff;}
.exam-opt.ex-ng .exam-opt-ind{border-color:var(--red);background:var(--red);color:#fff;}
.exam-input{width:100%;padding:8px 11px;border:2px solid var(--border);border-radius:7px;font-size:12px;outline:none;transition:.2s;font-family:inherit;}
.exam-input:focus{border-color:var(--indigo);}
.exam-input.ex-ok{border-color:var(--green);background:#e8f8ed;}
.exam-input.ex-ng{border-color:var(--red);background:#fde8ec;}
.exam-textarea{width:100%;padding:8px 11px;border:2px solid var(--border);border-radius:7px;font-size:12px;outline:none;transition:.2s;resize:vertical;min-height:62px;font-family:inherit;}
.exam-textarea:focus{border-color:var(--indigo);}
.exam-sort-bank{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#f0f4ff;border-radius:7px;min-height:36px;margin-bottom:5px;border:2px dashed #c5d0f8;}
.exam-sort-slot{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#fff;border-radius:7px;min-height:36px;border:2px dashed var(--border);}
.exam-chip{padding:4px 9px;background:var(--indigo);color:#fff;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;transition:.2s;user-select:none;border:none;}
.exam-chip:hover{background:var(--navy);}
.exam-chip.placed{background:#28a745;}
.exam-fb{font-size:11px;padding:6px 9px;border-radius:6px;margin-top:6px;display:none;}
.exam-fb.ok{background:#e8f8ed;color:#155724;border:1px solid #b2dfdb;}
.exam-fb.ng{background:#fde8ec;color:#721c24;border:1px solid #f5c6cb;}
.exam-fb.vis{display:block;}
.exam-submit-wrap{text-align:center;margin-top:20px;}
.exam-submit-btn{padding:12px 32px;background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;}
.exam-submit-btn:hover{transform:translateY(-2px);}
/* EXAM RESULT */
.exam-result{background:#fff;border-radius:16px;box-shadow:var(--sh);padding:32px 24px;text-align:center;margin-bottom:16px;}
.exam-result-emoji{font-size:56px;margin-bottom:12px;}
.exam-result-score{font-size:50px;font-weight:700;color:var(--indigo);}
.exam-result-total{font-size:14px;color:var(--muted);margin-bottom:20px;}
.exam-breakdown{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:16px 0;}
.ex-bd{background:#f0f4ff;border-radius:9px;padding:10px 14px;text-align:center;min-width:85px;}
.ex-bd-num{font-size:18px;font-weight:700;color:var(--indigo);}
.ex-bd-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

@media(max-width:720px){
  .app{flex-direction:column;padding:10px;}
  .sidebar{width:100%;position:static;}
  .lb{display:inline-block;width:auto;border-left:none;border-bottom:2px solid transparent;padding:6px 10px;}
  .lb.act{border-left:none;border-bottom-color:var(--indigo);}
  .sb-sec{display:flex;flex-wrap:wrap;}
  .sb-title{width:100%;}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-ico">47</div>
      <div>
        <div class="logo-txt">英文法マスター</div>
        <div class="logo-sub">Lessons 21–30 ｜ 比較・関係詞・仮定法</div>
      </div>
    </div>

          {en:"<mark>The more</mark> I study, <mark>the more</mark> I know.",jp:"勉強すればするほど、より多くのことを知る。",note:"〈the＋比較級…, the＋比較級…〉「〜すればするほど…」",hint:"The＋比較級で始まる節は、比例関係を表す。両方の節にtheをつける。"},
          {en:"We respect him <mark>all the more for</mark> his honesty.",jp:"彼の誠実さのゆえに、いっそう彼を尊敬している。",note:"〈all the＋比較級〉「それだけ〜/ますます〜」",hint:"all the＋比較級の後にfor/becauseをつけて理由を示せる。"},
          {en:"His behavior was <mark>more foolish than rude</mark>.",jp:"彼の行動は失礼というよりはむしろ愚かだった。",note:"〈more B than A〉「AというよりはむしろB」",hint:"more B than Aはnot so much A as Bと同じ意味で使える。"},
          {en:"He can't write a simple report, <mark>much[still] less</mark> a novel.",jp:"彼は簡単なレポートさえ書けないのに、ましてや小説など書けない。",note:"〈much[still] less〉「ましてや…でない」",hint:"否定文の後ろにmuch lessを続けて「ましてや〜はなおさら無理だ」を表す。"},
          {en:"Humans are <mark>superior to</mark> gorillas in intelligence.",jp:"人間は知性においてゴリラよりも優れている。",note:"〈superior to〜〉「〜より優れている」はtoを使う（thanではない）",hint:"superior/inferior/senior/juniorなどはthanではなくtoを使う。"},
        ],tips:[]
      },
      {badge:"B",title:"noを使った比較表現",formula:"",
        pts:[
          {en:"<em>The video camera</em> is <mark>no bigger than</mark> <em>my hand</em>.",jp:"そのビデオカメラは手のひらほどの大きさしかない。",note:"〈A…no＋比較級＋than B〉「同じ程度にしか…でない」",hint:"noは「少しも（程度が超えない）」というニュアンスで比較級を打ち消す。"},
          {en:"(a) <em>Sleeping too much</em> is <mark>no more healthy than</mark> <em>eating too much</em> (is).",jp:"寝すぎは食べすぎと同様に健康的でない。",note:"〈A…no more…than B〉「〜と同様に…でない」（クジラの構文）",hint:"no more...than（クジラの構文）：AもBも同様に「〜でない」という比較。"},
          {en:"(b) <em>Relaxing</em> is <mark>no less important than</mark> <em>working</em> (is).",jp:"休息することは働くことと同様に重要だ。",note:"〈A…no less…than B〉「〜に劣らず…だ」",hint:"no less...thanはAとBが同様に「〜だ」という肯定的比較。"},
          {en:"(a) He paid me <mark>no more than</mark> 3,000 yen for the work.",jp:"彼はその仕事に対してたったの3,000円しか払わなかった。",note:"〈no more than〜〉「(ほんの)〜しか」＝only",hint:"no more than=only（少なさを強調）。not more than=at most（上限）。"},
          {en:"(b) There were <mark>not more than</mark> twenty people in the theater.",jp:"その劇場には多くても20人しかいなかった。",note:"〈not more than〜〉「(多くて)せいぜい〜」＝at most",hint:"not more thanは「多くてもせいぜい〜」という上限を表す。"},
          {en:"(a) She paid me <mark>no less than</mark> 30,000 yen for the work.",jp:"彼女はその仕事に対して30,000円もの額を払ってくれた。",note:"〈no less than〜〉「〜ほども多く」＝as many[much] as〜",hint:"no less than=as many as（多さを強調）。not less than=at least（下限）。"},
          {en:"(b) The cost will be <mark>not less than</mark> 20,000 yen.",jp:"費用は少なくとも20,000円になるだろう。",note:"〈not less than〜〉「少なくとも〜」＝at least",hint:"not less thanは「少なくとも〜」という下限を表す。"},
        ],tips:[]
      },
      {badge:"C",title:"最上級を用いたさまざまな表現",formula:"",
        pts:[
          {en:"(a) I feel <mark>happiest</mark> when I'm with my friends.",jp:"私は友達といる時が一番幸せだ。",note:"自分の中での比較の場合、最上級にtheはつけない。",hint:"同じ人・物の中での比較（自分の中での比較）はtheなしの最上級を使う。"},
          {en:"(b) This lake is <mark>deepest</mark> here.",jp:"この湖はここが一番深い。",hint:"場所や状況による自分自身の比較もtheなしで最上級を使う。"},
          {en:"(a) People are <mark>at their best</mark> when they are under pressure.",jp:"人はプレッシャーにさらされている時に最高の状態になる。",note:"〈at one's best〉「最高の状態の」",hint:"at one's bestは「能力・状態が最高の時」を表す慣用表現。"},
          {en:"(b) The small factory can produce 30 cars a month <mark>at (the) best</mark>.",jp:"その小工場は月に最高でも30台の車しか生産できない。",note:"〈at (the) best〉「せいぜい〜程度」",hint:"at bestは「最良の場合でも〜しかない」という限界を示す表現。"},
        ],tips:[]
      }
    ]
  },
  l24:{num:24,title:"関係詞 (1)",jp:"who・which・whose・that（主格・目的格・所有格）",color:"#5563a8",
    desc:"関係代名詞の主格・目的格・所有格の使い方と、thatが特に好まれる場合。",
    sections:[
      {badge:"A",title:"who と which（主格）",
        formula:"先行詞（人）＋<b>who</b>＋V ／ 先行詞（物）＋<b>which</b>＋V",
        pts:[
          {en:"(a) I have <mark>a friend</mark> <mark>who</mark> lives in Boston.",jp:"私にはボストンに住んでいる友人がいる。",note:"who：先行詞が人で主格。",hint:"whoは先行詞が人で、関係詞節の中で主語の働きをする。"},
          {en:"(b) They live in <mark>a house</mark> <mark>which</mark> stands on a hill.",jp:"彼らは丘の上に建つ家に住んでいる。",note:"which：先行詞が人以外。",hint:"whichは先行詞が物・動物などで、関係詞節の中で主語の働きをする。"},
        ],tips:[]
      },
      {badge:"B",title:"whom と which（目的格）",
        formula:"先行詞（人）＋<b>(whom)</b>＋S＋V ／ 先行詞（物）＋<b>(which)</b>＋S＋V",
        pts:[
          {en:"(a) <mark>The man</mark> <mark>(whom)</mark> I met on the street works at a bank.",jp:"街で会った男性は銀行で働いている。",note:"whomは文章体。目的格の関係代名詞は省略されることが多い。",hint:"目的格の関係代名詞（who/whom/which/that）は省略できる。"},
          {en:"(b) I'm reading <mark>a book</mark> <mark>(which)</mark> I borrowed from the library.",jp:"私は図書館から借りた本を読んでいる。",hint:"関係詞の後にSVが続いていたら目的格→省略可能のサイン。"},
        ],tips:[]
      },
      {badge:"C",title:"whose（所有格）",
        formula:"先行詞（人/物）＋<b>whose</b>＋名詞",
        pts:[
          {en:"(a) He has <mark>a friend</mark> <mark>whose wife</mark> is a singer.",jp:"彼は妻が歌手である友人がいる。",note:"〈whose＋名詞〉の形で所有格の意味を表す。",hint:"whose＋名詞はhis/her/its＋名詞に相当する所有格の関係詞。"},
          {en:"(b) I'm looking for <mark>a book</mark> <mark>whose subject</mark> is jazz.",jp:"私はジャズをテーマにした本を探している。",note:"先行詞が人でも物でもwhoseを使う。",hint:"先行詞が物の場合もwhoseを使う（of whichで書き換えも可）。"},
        ],tips:[]
      },
      {badge:"D",title:"that（主格／目的格）— thatが特に使われる場合",
        formula:"先行詞（人/物）＋<b>that</b>＋V（主格）／ <b>(that)</b>＋S＋V（目的格）",
        pts:[
          {en:"(a) I lent him <em>the money</em> <mark>that</mark> was in my pocket.",jp:"私は彼にポケットの中にあったお金を貸した。",note:"that：whichの代わりに使える（主格・目的格）。所有格としては使えない。",hint:"thatは人にも物にも使えるが、所有格（whose）の代わりにはなれない。"},
          {en:"(b) Where is <em>the CD</em> <mark>(that)</mark> I bought yesterday?",jp:"私が昨日買ったCDはどこですか？",hint:"the only/first/last/最上級などの後は特にthatが好まれる。"},
        ],
        tips:["thatが特に使われる場合：","(A)the first, the last,〈the＋最上級〉,the same, the onlyなど特定の1つを示す修飾語を伴う場合","(B)先行詞がall, every, any, noなどを伴う場合","(C)先行詞が〈人＋人以外のもの〉の場合","(D)先行詞が疑問詞whoの場合","(E)先行詞が人の性質や状態を表し、関係代名詞が補語となっている場合：He is not the man that he was ten years ago."]
      }
    ]
  },
  l25:{num:25,title:"関係詞 (2)",jp:"前置詞・what・限定用法と継続用法",color:"#5563a8",
    desc:"前置詞と関係代名詞の組み合わせ、whatの用法、限定用法と継続用法の違い。",
    sections:[
      {badge:"A",title:"前置詞と関係代名詞",
        formula:"先行詞＋<b>前置詞＋whom/which</b>＋S＋V（文語体）",
        pts:[
          {en:"(a) He is <mark>the actor</mark> <mark>(who(m)[that])</mark> Ann sent a fan letter <mark>to</mark>.",jp:"彼はアンがファンレターを送った俳優だ。",hint:"前置詞を後ろに残す場合、関係代名詞は省略可能。"},
          {en:"(b) This is <mark>the city</mark> <mark>(which[that])</mark> I was born <mark>in</mark>.",jp:"ここは私が生まれた都市だ。",hint:"in which I was born ＝ which I was born in（前置詞の位置に注意）。"},
        ],
        tips:["前置詞を後ろに置く場合→who(m)/which/that が使えて省略も可。","前置詞を前に出す場合→whom か which のみ使用可、省略不可。","例：He is the actor to whom(×who/that) Ann sent a fan letter.（文語体）","群動詞の前置詞は前に出さない：My mother found the key (which[that]) I had been looking for."]
      },
      {badge:"B",title:"what（先行詞を含む関係代名詞）",
        formula:"<b>what</b>＝the thing(s) that〜（先行詞を内包）",
        pts:[
          {en:"(a) <mark>What</mark> worries me is the result of the exam.",jp:"私を悩ませているのは試験の結果だ。",hint:"Whatで始まる節が主語になれる（What S V is...）。"},
          {en:"(b) They couldn't believe <mark>what</mark> they saw.",jp:"彼らは自分たちが見たものを信じられなかった。",hint:"whatは動詞の目的語にもなれる（believe what they saw）。"},
          {en:"(c) This watch is just <mark>what</mark> I wanted!",jp:"この時計はまさに私が欲しかったものだ！",hint:"whatは補語にもなれる（〜is what...）。文の主要3ポジション全てOK。"},
        ],
        tips:["関係代名詞what：「〜すること[もの]」先行詞なしで使う。","whatの節は(a)文全体の主語、(b)目的語、(c)補語になる。"]
      },
      {badge:"C",title:"限定用法と継続用法",formula:"",
        pts:[
          {en:"(a) He married <mark>[a woman]</mark> <mark>who(m)</mark> he met at the hospital.",jp:"彼は病院で会った女性と結婚した。",note:"限定用法：先行詞の内容を限定する。",hint:"限定用法：コンマなし。「どんな女性か」を限定して説明する。"},
          {en:"(b) He married <mark>[my sister]</mark>, <mark>who(m)</mark> he met at the hospital.",jp:"彼は私の姉と結婚した。彼女には病院で会った。",note:"継続用法：先行詞の内容を補足説明する。コンマ(,)を入れる。thatは継続用法には用いない。",hint:"継続用法：コンマあり。先行詞について補足情報を加えるだけ。thatは使えない。"},
          {en:"(a) He gave me some chocolates, <mark>which</mark> I ate at once.",jp:"彼はチョコレートをくれたので、私はすぐに食べた。",hint:"継続用法のwhichは前の節全体を受けてand/but/becauseなどに書き換えられる。"},
          {en:"(b) She lent me some books, <mark>which</mark> were not interesting.",jp:"彼女は私に本を何冊か貸してくれたが、それらはおもしろくなかった。",hint:"whichがbut they〜の意味に近い（逆接的な補足）。"},
          {en:"(c) I telephoned Rod, <mark>who</mark> had called while I was out.",jp:"私はロッドに電話した。外出中に電話してきていたからだ。",hint:"whoがbecause he〜の意味に近い（理由を示す補足）。"},
        ],
        tips:["thatは継続用法には使えない。継続用法にはwho/which（コンマあり）を使う。","継続用法のwhichは直前の語句・節・文の内容全体を先行詞にできる。"]
      }
    ]
  },
  l26:{num:26,title:"関係詞 (3)",jp:"関係副詞（where・when・why・how）・複合関係詞",color:"#5563a8",
    desc:"関係副詞の4種類と複合関係詞（whoever・whatever・wheneverなど）の用法。",
    sections:[
      {badge:"A",title:"関係副詞（where・when・why・how）",
        formula:"先行詞（場所）＋<b>where</b> ／ 先行詞（時）＋<b>when</b> ／ 先行詞（理由）＋<b>why</b> ／ 先行詞なし＋<b>how</b>",
        pts:[
          {en:"This is <mark>[the hospital]</mark> <mark>where</mark> my aunt works.",jp:"ここは私の叔母が働いている病院だ。",note:"where：「場所」を表す副詞の役割。",hint:"whereは「場所」を表す先行詞の後で使い、前置詞＋whichに書き換えられる。"},
          {en:"There was <mark>[a time]</mark> <mark>when</mark> dinosaurs lived on the earth.",jp:"恐竜が地球上に生きていた時代があった。",note:"when：「時」を表す副詞の役割。",hint:"whenは「時」を表す先行詞（time/day/momentなど）の後で使う。"},
          {en:"(a) Tell me <mark>[the reason]</mark> <mark>why</mark> you look so happy today.",jp:"今日そんなに幸せそうな理由を教えて。",note:"why：「〜する(理由)」先行詞はreason(s)。",hint:"whyの先行詞は通常reasonだけ。省略されることも多い。"},
          {en:"(b) I really like sweets. That's <mark>why</mark> my teeth are bad.",jp:"私は甘いものが大好きです。だから歯が悪いのです。",hint:"That's why〜は「だから〜だ」という結果を示す慣用表現。"},
          {en:"That's <mark>how</mark> he succeeded in business.",jp:"それが彼がビジネスで成功したやり方だ。",note:"how：「〜するやり方[方法]」先行詞なしで使う。×the way how",hint:"howは先行詞なしで使う。the wayとhowは同時に使えないので注意。"},
          {en:"(a) She moved to New York, <mark>where</mark> she studied music.",jp:"彼女はニューヨークへ引っ越した。そこで音楽を勉強した。",note:"関係副詞の継続用法：whereとwhenは継続用法で使える。",hint:"whereの継続用法はand there〜に書き換えられる。"},
          {en:"(b) I was taking a shower at seven, <mark>when</mark> the lights went out!",jp:"7時にシャワーを浴びていると、突然停電した！",hint:"whenの継続用法は「〜していたそのとき、突然…」という場面転換を表す。"},
        ],
        tips:["場合・状況を表す語(case, point, situationなど)も先行詞となる。"]
      },
      {badge:"B",title:"複合関係詞（whoever・whichever・whatever・whenever・wherever）",
        formula:"<b>複合関係詞</b>（-ever）＝名詞節または副詞節を作る",
        pts:[
          {en:"(a) The club admits <mark>whoever</mark> pays the entry fee.",jp:"そのクラブは入場料を払う人は誰でも入れる。",note:"〜する人はだれでも",hint:"whoever＝no matter who。名詞節（〜する人はだれでも）を作る。"},
          {en:"(b) Help yourself to <mark>whichever</mark> you want.",jp:"欲しいものはどれでもお取りください。",note:"〜するものはどれ[どちら]でも",hint:"whicheverは限られた選択肢の中から「どれでも」を表す。"},
          {en:"(c) You can order <mark>whatever</mark> you like.",jp:"あなたは何でも好きなものを注文できる。",note:"〜するものは何でも",hint:"whateverは「何でも」で範囲が広い。何の制限もないことを示す。"},
          {en:"(a) On holidays, we can get up <mark>whenever</mark> we want to.",jp:"休日には、好きな時間に起きることができる。",note:"〜する時ならいつでも",hint:"wheneverは「いつでも」（任意の時点）を表す副詞節を作る。"},
          {en:"(b) I visit my uncle <mark>whenever</mark> I go to Osaka.",jp:"大阪に行く時はいつも叔父を訪問する。",note:"〜する時はいつも",hint:"wheneverは「〜するたびに／するときはいつも」という繰り返しも表せる。"},
          {en:"(c) Put the table <mark>wherever</mark> you like.",jp:"テーブルは好きなところに置いていいですよ。",note:"〜するところならどこでも",hint:"whereverは「どこでも」を表す副詞節を作る。"},
        ],
        tips:["whicheverとwhateverは直後に名詞を置いて形容詞的に用いることができる。"]
      }
    ]
  },
  l27:{num:27,title:"関係詞 (4)",jp:"譲歩の複合関係詞・as/than・様々な用法・what慣用表現",color:"#5563a8",
    desc:"「〜しようとも」の譲歩、関係代名詞として働くasとthan、whatを使った慣用表現。",
    sections:[
      {badge:"A",title:"「譲歩」を表す複合関係詞▶「〜しようとも」という意味を表し副詞節を作る",
        formula:"<b>however</b>＋形容詞/副詞＋S＋V「どれほど〜でも」",
        pts:[
          {en:"(a) <mark>Whoever</mark> calls me, I don't want to answer the phone.",jp:"誰が電話してきても、私は出たくない。",note:"だれが〜しようとも（＝no matter who）",hint:"Whoeverは節の中で主語の役割を果たしながら「誰でも」を意味する。"},
          {en:"(b) <mark>Whichever</mark> you take, please return it tomorrow.",jp:"どれを取っても、明日返してください。",note:"どれを[どちらを]〜しようとも（＝no matter which）",hint:"Whicheverは選択肢が限られている場面で使う。"},
          {en:"(c) <mark>Whatever</mark> happens, I will always love you.",jp:"何が起こっても、私はずっとあなたを愛している。",note:"何が[を]〜しようとも（＝no matter what）",hint:"Whateverは「何が〜しようとも」を表す最も広い意味の複合関係詞。"},
          {en:"(a) <mark>However tired</mark> she is, she always smiles.",jp:"どんなに疲れていても、彼女はいつも微笑む。",note:"どれほど〜でも（＝no matter how）",hint:"Howeverは後ろに形容詞・副詞を置いて「どれほど〜でも」を表す。"},
          {en:"(b) You will be welcomed <mark>whenever</mark> you come.",jp:"いつ来ても歓迎されますよ。",note:"いつ〜しようとも（＝no matter when）",hint:"Wheneverは「いつ〜しようとも」という時間の譲歩を表す。"},
          {en:"(c) I'll be thinking of you <mark>wherever</mark> you go.",jp:"あなたがどこへ行っても、あなたのことを思っているよ。",note:"どこへ[で]〜しようとも（＝no matter where）",hint:"Whereverは「どこに〜しようとも」という場所の譲歩を表す。"},
        ],
        tips:["whoever=no matter who ／ whatever=no matter what ／ however=no matter how"]
      },
      {badge:"B",title:"関係代名詞の働きをする as と than",formula:"",
        pts:[
          {en:"(a) This is <em>the same</em> jacket <mark>as</mark> was worn by the actor in the movie.",jp:"これはその映画でその俳優が着ていたのと同じ上着だ。",note:"〜するのと同じ〜",hint:"the same...asのasは関係代名詞として節の中で主語・目的語の働きをする。"},
          {en:"(b) Oil and water do not mix, <mark>as</mark> we all know.",jp:"油と水は交わらない。ご存知の通り。",hint:"継続用法のasは「ご存知の通り」「予想通り」などの補足説明を追加する。"},
          {en:"You did <em>more</em> work <mark>than</mark> I had expected.",jp:"あなたは私が期待していた以上の仕事をした。",note:"thanは節の中で主語や目的語の働きをする。",hint:"thanも関係代名詞として節の中の主語や目的語の役割を担うことがある。"},
        ],tips:[]
      },
      {badge:"C",title:"関係代名詞のさまざまな用法",formula:"",
        pts:[
          {en:"The woman <mark>who I thought</mark> was her sister was actually her mother.",jp:"彼女の姉だと私が思っていた女性は、実は母親だった。",note:"関係代名詞の後にI thinkなどの節(SV)が続くことがある。",hint:"who I thoughtのように挿入節（I think/I believe等）が入っても関係代名詞の格は変わらない。"},

// ================================================================
// QUIZ RENDERING
// ================================================================
function renderQuiz(id) {
  const qs = QUIZ_BANK[id] || [];
  const st = quizState[id] || {idx:0,score:0,answered:false,finished:false};
  quizState[id] = st;
  if (st.finished) return renderResult(id);
  const q = qs[st.idx];
  const pct = Math.round(st.idx / qs.length * 100);
  const typeBadge = {mc:'四択問題',fill:'穴埋め問題',sort:'並び替え問題',write:'ライティング問題',twist:'ひねり問題'};
  const typeCls = {mc:'tb-mc',fill:'tb-fill',sort:'tb-sort',write:'tb-write',twist:'tb-twist'};
  const diffStar = '⭐'.repeat(q.diff);

  let ansHtml = '';
  if (q.type === 'mc') {
    ansHtml = `<div class="qopts">${q.opts.map((o,i)=>`
      <button class="qopt" onclick="answerMC('${id}',${i})">
        <span class="opt-ind">${String.fromCharCode(65+i)}</span>${o}
      </button>`).join('')}</div>`;
  } else if (q.type === 'fill') {
    const blanks = (q.blank.match(/_+/g)||[]).length;
    let inputs = '';
    for(let i=0;i<blanks;i++) inputs += `<input class="fill-input" id="fi-${id}-${i}" placeholder="答えを入力..." />`;
    ansHtml = `${inputs}<button class="submit-btn" onclick="answerFill('${id}')">確認</button>`;
  } else if (q.type === 'sort') {
    const shuffled = [...q.words].sort(()=>Math.random()-.5);
    ansHtml = `
      <div class="slot-lbl">単語バンク（クリックで並べ替え）</div>
      <div class="sort-bank" id="bank-${id}">${shuffled.map(w=>`<button class="chip" onclick="moveChip('${id}',this,'slot')" data-word="${w}">${w}</button>`).join('')}</div>
      <div class="slot-lbl">回答欄（クリックで戻す）</div>
      <div class="sort-slot" id="slot-${id}"></div>
      <button class="submit-btn" onclick="answerSort('${id}')">確認</button>`;
  } else {
    ansHtml = `<textarea class="write-area" id="wa-${id}" placeholder="英文を入力してください..."></textarea>
      <button class="submit-btn" onclick="answerWrite('${id}')">確認する</button>`;
  }

  return `
    <div class="qprog">
      <span class="qcnt">問 ${st.idx+1} / ${qs.length}</span>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%"></div></div>
      <span class="score-bdg">${st.score} 正解</span>
    </div>
    <div class="qcard">
      <div class="qlbl">Q${st.idx+1} ${diffStar}</div>
      <span class="qtbadge ${typeCls[q.type]}">${typeBadge[q.type]}</span>
      <div class="qtext">${q.q}</div>
      ${q.blank ? `<div class="qsub">${q.blank}</div>` : ''}
      ${ansHtml}
      <div class="qfb" id="qfb-${id}"></div>
    </div>
    <div class="qnav"><button class="btn-next" id="qnext-${id}" onclick="nextQ('${id}')">次の問題 →</button></div>`;
}

function renderResult(id) {
  const qs = QUIZ_BANK[id] || [];
  const st = quizState[id];
  if (!st || !st.finished) return '';
  const pct = Math.round(st.score/qs.length*100);
  const emoji = pct>=80?'🏆':pct>=60?'👍':'💪';
  const msg = pct>=80?'素晴らしい！完璧に理解しています！':pct>=60?'よくできました！もう少し復習してみましょう。':'解説を読んで、もう一度チャレンジしてみましょう！';
  return `<div class="result vis">
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${st.score} / ${qs.length}</div>
    <div class="result-msg">${msg}（正解率 ${pct}%）</div>
    <button class="btn-retry" onclick="retryQuiz('${id}')">🔄 もう一度</button>
    <button class="btn-retry sec" onclick="switchTabForId('st-${id}')">📖 解説を見る</button>
  </div>`;
}

function renderAI(id) {
  const L = LESSONS_DATA[id];
  return `<div class="ai-area">
    <div class="ai-title">🤖 AIに質問する</div>
    <div class="ai-desc">「${L.title}」について、わからないことを何でも質問してください。英作文の添削、例文の説明、応用問題など何でもOK！</div>
    <div class="ai-row">
      <textarea class="ai-input" id="aii-${id}" rows="2" placeholder="例：「as if の後ろはなぜ過去形？」「この英文を添削して」など"></textarea>
      <button class="ai-btn" onclick="askAI('${id}')">送信 →</button>
    </div>
    <div class="ai-loading" id="ail-${id}"><div class="dp"><span></span><span></span><span></span></div>AIが回答を考えています...</div>
    <div class="ai-resp" id="air-${id}"></div>
  </div>`;
}

// ================================================================
// QUIZ ANSWER HANDLERS
// ================================================================
function showFeedback(id, correct, exp, model) {
  const fb = document.getElementById(`qfb-${id}`);
  const btn = document.getElementById(`qnext-${id}`);
  if (!fb || !btn) return;
  fb.className = `qfb ${correct?'ok':'ng'} vis`;
  let modelTxt = model ? `<br><br>📝 <strong>模範解答：</strong>${model}` : '';
  fb.innerHTML = `<strong>${correct?'✅ 正解！':'❌ 不正解'}</strong>${exp}${modelTxt}`;
  btn.classList.add('vis');
  const st = quizState[id];
  if (correct) { st.score++; addXP(10); }
  st.answered = true;
}

function answerMC(id, idx) {
  const st = quizState[id];
  if (st.answered) return;
  const q = QUIZ_BANK[id][st.idx];
  document.querySelectorAll(`#qz-${id} .qopt`).forEach((b,i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('ok');
    else if (i === idx && idx !== q.ans) b.classList.add('ng');
  });
  showFeedback(id, idx === q.ans, q.exp, null);
}

function answerFill(id) {
  const st = quizState[id];
  if (st.answered) return;
  const q = QUIZ_BANK[id][st.idx];
  const answers = Array.isArray(q.ans) ? q.ans : [q.ans];
  let allOk = true;
  const blanks = (q.blank.match(/_+/g)||[]).length;
  for (let i = 0; i < blanks; i++) {
    const input = document.getElementById(`fi-${id}-${i}`);
    if (!input) continue;
    const val = input.value.trim().toLowerCase();
    const correctAns = answers[i] ? (Array.isArray(answers[i]) ? answers[i] : [answers[i]]) : [answers[0]];
    const ok = correctAns.some(a => val === a.toLowerCase());
    input.classList.add(ok ? 'ok' : 'ng');
    input.disabled = true;
    if (!ok) allOk = false;
  }
  showFeedback(id, allOk, q.exp, null);
}

function moveChip(id, btn, dir) {
  if (dir === 'slot') {
    document.getElementById(`slot-${id}`).appendChild(btn);
    btn.onclick = () => moveChip(id, btn, 'bank');
    btn.classList.add('placed');
  } else {
    document.getElementById(`bank-${id}`).appendChild(btn);
    btn.onclick = () => moveChip(id, btn, 'slot');
    btn.classList.remove('placed');
  }
}

function answerSort(id) {
  const st = quizState[id];
  if (st.answered) return;
  const q = QUIZ_BANK[id][st.idx];
  const slot = document.getElementById(`slot-${id}`);
  const chips = slot.querySelectorAll('.chip');
  const ans = Array.from(chips).map(c => c.dataset.word).join(' ');
  const correct = ans.toLowerCase() === q.ans.toLowerCase();
  chips.forEach(c => { c.classList.add('disabled'); c.disabled = true; });
  showFeedback(id, correct, q.exp, correct ? null : q.ans);
}

function answerWrite(id) {
  const st = quizState[id];
  if (st.answered) return;
  const q = QUIZ_BANK[id][st.idx];
  const val = (document.getElementById(`wa-${id}`)?.value || '').trim();
  addXP(5);
  st.answered = true;
  const fb = document.getElementById(`qfb-${id}`);
  const btn = document.getElementById(`qnext-${id}`);
  if (fb) {
    fb.className = 'qfb ok vis';
    fb.innerHTML = `<strong>📝 あなたの回答：</strong>${val}<br><br><strong>✅ 模範解答：</strong>${q.model}<br><br><strong>💡 解説：</strong>${q.exp}`;
  }
  if (btn) btn.classList.add('vis');
}

function nextQ(id) {
  const qs = QUIZ_BANK[id];
  const st = quizState[id];
  if (st.idx < qs.length - 1) {
    st.idx++;
    st.answered = false;
  } else {
    st.finished = true;
  }
  const tab = document.getElementById(`qz-${id}`);
  if (tab) tab.innerHTML = renderQuiz(id);
}

function retryQuiz(id) {
  quizState[id] = {idx:0,score:0,answered:false,finished:false};
  const tab = document.getElementById(`qz-${id}`);
  if (tab) tab.innerHTML = renderQuiz(id);
}

function switchTabForId(tabId) {
  const tab = document.getElementById(tabId);
  if (!tab) return;
  const card = tab.closest('.lcard');
  card.querySelectorAll('.tbtn').forEach(b => b.classList.remove('act'));
  card.querySelectorAll('.tc').forEach(c => c.classList.remove('act'));
  card.querySelectorAll('.tbtn')[0].classList.add('act');
  tab.classList.add('act');
}

// ================================================================
// AI（文法質問）
// ================================================================
async function askAI(id) {
  const L = LESSONS_DATA[id];
  const input = document.getElementById(`aii-${id}`);
  const loading = document.getElementById(`ail-${id}`);
  const resp = document.getElementById(`air-${id}`);
  const btn = input?.closest('.ai-area')?.querySelector('.ai-btn');
  const q = input?.value.trim();
  if (!q) { input?.focus(); return; }
  if (btn) btn.disabled = true;
  if (loading) loading.classList.add('vis');
  if (resp) { resp.classList.remove('vis'); resp.textContent = ''; }

  const sys = `あなたは日本人高校生向けの英文法専門の先生です。
今学習中のレッスン：Lesson ${L.num}「${L.title}（${L.jp}）」
以下のルールで回答してください：
- 日本語でわかりやすく説明する
- 具体的な英語の例文を必ず使う
- なぜその形になるかの理由も説明する
- 高校生が理解できるよう専門用語は補足説明する
- 英作文の添削の場合は誤りを指摘し正しい形と理由を説明する
- 回答は簡潔にまとめる`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:q}]})
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('')||'回答を取得できませんでした。';
    if (resp) { resp.textContent = text; resp.classList.add('vis'); }
    addXP(5);
  } catch(e) {
    if (resp) { resp.textContent = '⚠️ 通信エラーが発生しました。もう一度お試しください。'; resp.classList.add('vis'); }
  }
  if (loading) loading.classList.remove('vis');
  if (btn) btn.disabled = false;
}

// ================================================================
// VOCAB QUIZ（300語からランダム4択）
// ================================================================
let vqState = {idx:0,score:0,answered:false,finished:false,bank:[]};

function buildVQBank() {
  const shuffled = [...VOCAB].sort(()=>Math.random()-.5).slice(0,20);
  return shuffled.map(v => {
    const wrongs = VOCAB.filter(w => w.id !== v.id).sort(()=>Math.random()-.5).slice(0,3).map(w => w.jp);
    const opts = shuffle([v.jp, ...wrongs]);
    return {q:`次の英単語の意味は？\n「${v.en}」[${v.pron}]`, opts, ans:v.jp, exp:`${v.en}：${v.jp}`};
  });
}

function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }

function renderVocabQuiz() {
  if (!vqState.bank || vqState.bank.length === 0) {
    vqState.bank = buildVQBank();
  }
  if (vqState.finished) {
    const pct = Math.round(vqState.score / vqState.bank.length * 100);
    return `<div class="result vis">
      <div class="result-emoji">${pct>=80?'🏆':pct>=60?'👍':'💪'}</div>
      <div class="result-score">${vqState.score} / ${vqState.bank.length}</div>
      <div class="result-msg">正解率 ${pct}%</div>
      <button class="btn-retry" onclick="retryVQ()">🔄 もう一度（新しい問題）</button>
    </div>`;
  }
  const q = vqState.bank[vqState.idx];
  const pct = Math.round(vqState.idx / vqState.bank.length * 100);
  return `
    <div class="qprog">
      <span class="qcnt">問 ${vqState.idx+1} / ${vqState.bank.length}</span>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%"></div></div>
      <span class="score-bdg">${vqState.score} 正解</span>
    </div>
    <div class="qcard">
      <div class="qlbl">単語クイズ</div>
      <div class="qtext" style="font-size:13px;white-space:pre-wrap;">${q.q}</div>
      <div class="qopts">${q.opts.map((o,i)=>`
        <button class="qopt" onclick="answerVQ(${i})">
          <span class="opt-ind">${String.fromCharCode(65+i)}</span>${o}
        </button>`).join('')}</div>
      <div class="qfb" id="vqfb"></div>
    </div>
    <div class="qnav"><button class="btn-next" id="vqnext" onclick="nextVQ()">次の問題 →</button></div>`;
}

function answerVQ(idx) {
  if (vqState.answered) return;
  vqState.answered = true;
  const q = vqState.bank[vqState.idx];
  const correct = q.opts[idx] === q.ans;
  document.querySelectorAll('#vocabQuizContent .qopt').forEach((b,i) => {
    b.disabled = true;
    if (q.opts[i] === q.ans) b.classList.add('ok');
    else if (i === idx && !correct) b.classList.add('ng');
  });
  const fb = document.getElementById('vqfb');
  const btn = document.getElementById('vqnext');
  if (fb) { fb.className = `qfb ${correct?'ok':'ng'} vis`; fb.innerHTML = `<strong>${correct?'✅ 正解！':'❌ 不正解'}</strong>${q.exp}`; }
  if (btn) btn.classList.add('vis');
  if (correct) { vqState.score++; addXP(10); }
}

function nextVQ() {
  if (vqState.idx < vqState.bank.length - 1) {
    vqState.idx++; vqState.answered = false;
  } else { vqState.finished = true; }
  document.getElementById('vocabQuizContent').innerHTML = renderVocabQuiz();
}

function retryVQ() {
  vqState = {idx:0,score:0,answered:false,finished:false,bank:buildVQBank()};
  document.getElementById('vocabQuizContent').innerHTML = renderVocabQuiz();
}

// ── 意味を問う問題かどうか判定 ──
function isMeaningQuestion(q) {
  const meaningPatterns = [
    /意味は/, /日本語の意味/, /の意味を/, /正しい説明/, /説明は/,
    /どういう意味/, /意味する/, /意味を表/
  ];
  return meaningPatterns.some(p => p.test(q.q || ''));
}

function pickRandom(arr, n) {
  return [...arr].sort(()=>Math.random()-.5).slice(0, n);
}

    <div style="text-align:center;padding:60px 20px;">
      <div class="dp" style="justify-content:center;margin-bottom:16px;"><span></span><span></span><span></span></div>
      <p style="color:var(--indigo);font-weight:700;font-size:15px;">単語穴埋め問題をAIが生成中です...</p>
      <p style="color:var(--muted);font-size:12px;margin-top:8px;">少々お待ちください（約10〜20秒）</p>
    </div>`;

  generateVocabSets().then(() => {
    examState.vocabReady = true;
    renderExamPaper();
  }).catch(() => {
    // AI失敗時はフォールバック問題を使用
    examState.vocabSets = buildFallbackVocabSets();
    examState.vocabReady = true;
    renderExamPaper();
  });
}

// ── AI生成：5穴文章×3セット ──
async function generateVocabSets() {
  const groups = [];
  for (let i = 0; i < 3; i++) {
    const picked = [...VOCAB].sort(()=>Math.random()-.5).slice(0, 5);
    groups.push(picked);
  }

  const prompt = `あなたは英語教材作成の専門家です。以下の3グループの英単語を使って、それぞれ約100語の英文（1〜2文）を作成してください。
各グループの5単語を全て文中に使い、使用箇所を___（3つのアンダースコア）に置き換えてください。
また、各グループについて4択の選択肢（正解1つ＋誤答3つ）を5単語分作成してください。

出力形式（JSON）：
{
  "sets": [
    {
      "sentence": "英文（___が5箇所）",
      "answers": ["単語1","単語2","単語3","単語4","単語5"],
      "opts": [
        ["正解","誤答A","誤答B","誤答C"],
        ["正解","誤答A","誤答B","誤答C"],
        ["正解","誤答A","誤答B","誤答C"],
        ["正解","誤答A","誤答B","誤答C"],
        ["正解","誤答A","誤答B","誤答C"]
      ]
    }
  ]
}

グループ1の単語：${groups[0].map(v=>v.en+'('+v.jp+')').join('、')}
グループ2の単語：${groups[1].map(v=>v.en+'('+v.jp+')').join('、')}
グループ3の単語：${groups[2].map(v=>v.en+'('+v.jp+')').join('、')}

必ずJSONのみを返してください。説明文は不要です。`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:2000,
      messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  const text = data.content?.map(c=>c.text||'').join('') || '';
  const clean = text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  examState.vocabSets = parsed.sets.map((s, gi) => ({
    ...s,
    opts: s.opts.map(o => shuffle(o))
  }));
}

// フォールバック：AI失敗時の代替問題
function buildFallbackVocabSets() {
  return [0,1,2].map(i => {
    const picked = [...VOCAB].sort(()=>Math.random()-.5).slice(i*5, i*5+5);
    const blanks = picked.map(v=>'___').join(' ... ');
    return {
      sentence: `Fill in the blanks: ${blanks}`,
      answers: picked.map(v=>v.en),
      opts: picked.map(v => {
        const wrongs = VOCAB.filter(w=>w.id!==v.id).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.en);
        return shuffle([v.en,...wrongs]);
      })
    };
  });
}

function selExamOpt(cat, idx, optIdx, btn) {
  if (examState.submitted) return;
  const wrap = document.getElementById(`eq-${cat}-${idx}`);
  wrap.querySelectorAll('.exam-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  if (!examState.answers[cat]) examState.answers[cat] = {};
  examState.answers[cat][idx] = optIdx;
}

function moveExamChip(cat, idx, btn, dir) {
  if (examState.submitted) return;
  if (dir === 'slot') {
    document.getElementById(`eslot-${cat}-${idx}`).appendChild(btn);
    btn.onclick = () => moveExamChip(cat, idx, btn, 'bank');
    btn.classList.add('placed');
  } else {
    document.getElementById(`ebank-${cat}-${idx}`).appendChild(btn);
    btn.onclick = () => moveExamChip(cat, idx, btn, 'slot');
    btn.classList.remove('placed');
  }
}

// ================================================================
// 採点
// ================================================================
async function submitExam() {
  const es = examState;
  if (es.submitted) return;
  es.submitted = true;

  // ボタンを無効化＆ローディング表示
  document.querySelector('.exam-submit-btn').disabled = true;
  document.querySelector('.exam-submit-btn').textContent = '🤖 AI採点中...';

  let total = 0;
  const breakdown = {vocab:0,mc:0,fill:0,sort:0,write:0,twist:0};

  // ── 単語穴埋め（3セット×5点）──
  es.vocabSets.forEach((s, si) => {
    let setScore = 0;
    for (let i = 0; i < s.answers.length; i++) {
      const sel = document.getElementById(`evs-${si}-${i}`);
      const chosen = sel ? sel.value : '';
      const correct = chosen.toLowerCase() === s.answers[i].toLowerCase();
      if (sel) {
        sel.disabled = true;
        sel.style.background = correct ? '#e8f8ed' : '#fde8ec';
        sel.style.border = correct ? '2px solid #28a745' : '2px solid #dc3545';
      }
      if (correct) setScore++;
    }
    const pts = Math.round(setScore / s.answers.length * 5);
    total += pts; breakdown.vocab += pts;
    const fb = document.getElementById(`efb-vocab-${si}`);
    if (fb) {
      fb.className = `exam-fb ${setScore===s.answers.length?'ok':'ng'} vis`;
      fb.innerHTML = `${setScore}/${s.answers.length}語正解（${pts}点）　正解：${s.answers.join('、')}`;
    }
  });

  // ── 四択（10問×2点）──
  es.mcQs.forEach((q, i) => {
    const a = es.answers.mc?.[i] ?? -1;
    const ok = a === q.ans;
    showExamFB('mc', i, ok, q.exp, null, q.ans);
    if (ok) { total += 2; breakdown.mc += 2; }
  });

  // ── 穴埋め（10問×2点）──
  es.fillQs.forEach((q, i) => {
    const answers = Array.isArray(q.ans) ? q.ans : [q.ans];
    const blanks = (q.blank.match(/_+/g)||[]).length;
    let allOk = true;
    for (let b = 0; b < blanks; b++) {
      const el = document.getElementById(`efi-fill-${i}-${b}`);
      if (!el) continue;
      const val = el.value.trim().toLowerCase();
      const correctAns = answers[b] ? (Array.isArray(answers[b]) ? answers[b] : [answers[b]]) : [answers[0]];
      const ok = correctAns.some(a => val === a.toLowerCase());
      el.classList.add(ok ? 'ex-ok' : 'ex-ng');
      el.disabled = true;
      if (!ok) allOk = false;
    }
    const fb = document.getElementById(`efb-fill-${i}`);
    if (fb) {
      const correctDisplay = answers.map(a => Array.isArray(a) ? a[0] : a).join(' / ');
      fb.className = `exam-fb ${allOk?'ok':'ng'} vis`;
      fb.innerHTML = `${allOk?'✅ 正解':'❌ 不正解'}：${q.exp}${!allOk?'<br>正解：'+correctDisplay:''}`;
    }
    if (allOk) { total += 2; breakdown.fill += 2; }
  });

  // ── 並び替え（5問×3点）──
  es.sortQs.forEach((q, i) => {
    const slot = document.getElementById(`eslot-sort-${i}`);
    const chips = slot?.querySelectorAll('.exam-chip') || [];
    const ans = Array.from(chips).map(c => c.dataset.word).join(' ');
    const ok = ans.toLowerCase() === q.ans.toLowerCase();
    chips.forEach(c => { c.classList.add('disabled'); c.disabled = true; });
    const fb = document.getElementById(`efb-sort-${i}`);
    if (fb) { fb.className = `exam-fb ${ok?'ok':'ng'} vis`; fb.innerHTML = `${ok?'✅ 正解':'❌ 不正解'}：${q.exp}${!ok?'<br>正解：'+q.ans:''}`; }
    if (ok) { total += 3; breakdown.sort += 3; }
  });

  // ── AI採点：ライティング（5問×3点）──
  const writeAnswers = es.writeQs.map((q,i) => ({
    question: q.q,
    model: q.model,
    exp: q.exp,
    userAns: document.getElementById(`eta-write-${i}`)?.value?.trim() || '（未回答）',
    idx: i
  }));
  const twistAnswers = es.twistQs.map((q,i) => ({
    question: `状況：「${q.jp}」を、ifを用いた仮定法で書き直す（${q.stem}の形で全文を完成させる）`,
    model: q.model,
    key: q.key,
    userAns: document.getElementById(`eta-twist-${i}`)?.value?.trim() || '（未回答）',
    idx: i
  }));

  // AI採点をまとめて実行
  const [writeScores, twistScores] = await Promise.all([
    aiGradeWriting(writeAnswers, 'write'),
    aiGradeWriting(twistAnswers, 'twist')
  ]);

  // ライティング採点結果を反映
  writeScores.forEach(r => {
    const pts = Math.min(3, Math.max(0, r.score));
    total += pts; breakdown.write += pts;
    const fb = document.getElementById(`efb-write-${r.idx}`);
    if (fb) {
      fb.className = `exam-fb ${pts>=2?'ok':'ng'} vis`;
      fb.innerHTML = `🤖 <strong>AI採点：${pts}/3点</strong><br>
        📝 <strong>あなたの回答：</strong>${writeAnswers[r.idx].userAns}<br>
        ✅ <strong>模範解答：</strong>${writeAnswers[r.idx].model}<br>
        💬 <strong>AIフィードバック：</strong>${r.feedback}`;
    }
    const ta = document.getElementById(`eta-write-${r.idx}`);
    if (ta) ta.disabled = true;
  });

  // ひねり採点結果を反映
  twistScores.forEach(r => {
    const pts = Math.min(3, Math.max(0, r.score));
    total += pts; breakdown.twist += pts;
    const fb = document.getElementById(`efb-twist-${r.idx}`);
    if (fb) {
      fb.className = `exam-fb ${pts>=2?'ok':'ng'} vis`;
      fb.innerHTML = `🤖 <strong>AI採点：${pts}/3点</strong><br>
        📝 <strong>あなたの回答：</strong>${twistAnswers[r.idx].userAns}<br>
        ✅ <strong>模範解答：</strong>${twistAnswers[r.idx].model}<br>
        💡 <strong>文法ポイント：</strong>${twistAnswers[r.idx].key}<br>
        💬 <strong>AIフィードバック：</strong>${r.feedback}`;
    }
    const ta = document.getElementById(`eta-twist-${r.idx}`);
    if (ta) ta.disabled = true;
  });

  document.getElementById('examProgBar').style.width = '100%';
  document.getElementById('examProgNum').textContent = `${total}点 / 100点`;
  addXP(50);
  document.getElementById('examContent').scrollIntoView({behavior:'smooth'});

  // 結果サマリーを先頭に追加
  const pct = total;
  const emoji = pct>=80?'🏆':pct>=60?'😊':pct>=40?'💪':'📚';
  const msg = pct>=80?'優秀！素晴らしい成績です！':pct>=60?'よくできました！苦手な分野を復習しよう。':pct>=40?'もう少し！解説をしっかり読んで再挑戦しよう。':'解説を読んで基礎から復習しよう。';

  const summary = document.createElement('div');
  summary.className = 'exam-result';
  summary.innerHTML = `
    <div class="exam-result-emoji">${emoji}</div>
    <div class="exam-result-score">${total}</div>
    <div class="exam-result-total">/ 100点</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">${msg}</p>
    <div class="exam-breakdown">
      <div class="ex-bd"><div class="ex-bd-num" style="color:var(--indigo)">${breakdown.vocab}/15</div><div class="ex-bd-lbl">単語穴埋め</div></div>
      <div class="ex-bd"><div class="ex-bd-num" style="color:var(--indigo)">${breakdown.mc}/20</div><div class="ex-bd-lbl">四択(×2点)</div></div>
      <div class="ex-bd"><div class="ex-bd-num" style="color:var(--green)">${breakdown.fill}/20</div><div class="ex-bd-lbl">穴埋め(×2点)</div></div>
      <div class="ex-bd"><div class="ex-bd-num" style="color:#fd7e14">${breakdown.sort}/15</div><div class="ex-bd-lbl">並び替え(×3点)</div></div>
      <div class="ex-bd"><div class="ex-bd-num" style="color:var(--red)">${breakdown.write}/15</div><div class="ex-bd-lbl">ライティング🤖</div></div>
      <div class="ex-bd"><div class="ex-bd-num" style="color:#6b4c9e">${breakdown.twist}/15</div><div class="ex-bd-lbl">仮定法ひねり🤖</div></div>
    </div>
    <button class="start-btn" style="margin-top:14px;" onclick="renderExamHome()">🔄 もう一度テストを受ける</button>`;
  document.getElementById('examContent').prepend(summary);
}

// ── AI採点関数 ──
async function aiGradeWriting(items, type) {
  const isKaso = (type === 'twist');
  const sys = isKaso
    ? `あなたは英語教師です。仮定法の英作文を採点してください。
採点基準（3点満点）：
3点：仮定法の形が完全に正しく、意味も正確
2点：仮定法の形はほぼ正しいが小さなミスがある
1点：仮定法の概念は理解しているが形に誤りがある
0点：仮定法になっていない、または未回答

各問題についてJSON形式で返してください：
{"results":[{"idx":問題番号,"score":点数,"feedback":"日本語で1〜2文のフィードバック"}]}`
    : `あなたは英語教師です。英作文を採点してください。
採点基準（3点満点）：
3点：文法・意味ともに完全に正しい
2点：意味は通じるが小さな文法ミスがある
1点：意味はわかるが文法の誤りが多い
0点：著しく不正確、または未回答

各問題についてJSON形式で返してください：
{"results":[{"idx":問題番号,"score":点数,"feedback":"日本語で1〜2文のフィードバック"}]}`;

  const content = items.map(it => isKaso
    ? `問題${it.idx}：「${it.question}」→ 解答：「${it.userAns}」`
    : `問題${it.idx}：設問「${it.question}」→ 解答：「${it.userAns}」`
  ).join('\n');

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:1000,
        system: sys,
        messages:[{role:"user", content}]})
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('') || '';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    return parsed.results;
  } catch(e) {
    // エラー時は全問2点で返す
    return items.map(it => ({idx:it.idx, score:2, feedback:'採点中にエラーが発生しました。模範解答と照らし合わせてご確認ください。'}));
  }
}

function showExamFB(cat, idx, correct, exp, model, correctIdx) {
  const wrap = document.getElementById(`eq-${cat}-${idx}`);
  if (!wrap) return;
  wrap.querySelectorAll('.exam-opt').forEach((b,i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('ex-ok');
    else if (b.classList.contains('sel') && !correct) b.classList.add('ex-ng');
  });
  const fb = document.getElementById(`efb-${cat}-${idx}`);
  if (fb) {
    fb.className = `exam-fb ${correct?'ok':'ng'} vis`;
    fb.innerHTML = `${correct?'✅ 正解':'❌ 不正解'}：${exp}`;
  }
}

function addXP(n) {
  totalXP += n;
  document.getElementById('xpBadge').textContent = totalXP + ' XP';
}
